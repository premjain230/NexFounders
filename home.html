<!DOCTYPE html>
<html>
<head>
<title>NexFounder – Home</title> 
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, Arial;
}

body{
  background: radial-gradient(circle at top, #0b1220, #050814);
  color:white;
  overflow-x:hidden;
  scroll-behavior:smooth;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{
  width:8px;
}
::-webkit-scrollbar-thumb{
  background:linear-gradient(#1e293b,#22d3ee);
  border-radius:10px;
}
::-webkit-scrollbar-track{
  background:#050814;
}

/* ===== LAYOUT ===== */
.layout{
  display:flex;
  min-height:100vh;
  max-width:1200px;
  margin:auto;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:260px;
  padding:20px;
  border-right:1px solid #1e293b;
  position:sticky;
  top:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  gap:6px;
  background:rgba(10,15,30,0.6);
  backdrop-filter:blur(18px);
}

.logo{
  font-size:26px;
  font-weight:800;
  color:#e2e8f0;
  padding:10px 14px;
  margin-bottom:10px;
}

.nav-item{
  display:flex;
  align-items:center;
  gap:14px;
  padding:13px 14px;
  border-radius:14px;
  text-decoration:none;
  color:#cbd5e1;
  font-size:16px;
  transition:0.25s;
  position:relative;
}

.nav-item:hover{
  background:rgba(34,211,238,0.08);
  transform:translateX(6px);
  color:white;
}

.nav-item.active{
  color:#22d3ee;
  font-weight:700;
}

.nav-icon{ width:24px; }

.post-btn{
  margin-top:auto;
  padding:14px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#22d3ee,#3b82f6);
  color:#0b1220;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  transition:0.25s;
}

.post-btn:hover{
  transform:scale(1.05);
}

/* ===== FEED ===== */
.feed-col{
  flex:1;
  border-right:1px solid #1e293b;
  min-height:100vh;
}

.feed-header{
  position:sticky;
  top:0;
  z-index:20;
  background:rgba(5,8,20,0.8);
  backdrop-filter:blur(12px);
  border-bottom:1px solid #1e293b;
}

.feed-tabs{
  display:flex;
}

.feed-tab{
  flex:1;
  text-align:center;
  padding:16px;
  color:#64748b;
  font-weight:600;
  cursor:pointer;
}

.feed-tab.active{
  color:white;
  border-bottom:2px solid #22d3ee;
}

/* CREATE POST */
.create-post{
  padding:18px;
  border-bottom:1px solid #1e293b;
  display:flex;
  gap:12px;
}

.create-avatar{
  width:46px;
  height:46px;
  border-radius:50%;
  background:#22d3ee;
  color:#0b1220;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
}

.create-right{ flex:1; }

textarea{
  width:100%;
  background:transparent;
  border:none;
  outline:none;
  color:white;
  font-size:16px;
  resize:none;
  min-height:70px;
}

textarea::placeholder{
  color:#64748b;
}

.create-actions{
  margin-top:10px;
  border-top:1px solid #1e293b;
  padding-top:12px;
  display:flex;
  justify-content:space-between;
}

.create-actions button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#22d3ee;
  color:#0b1220;
  font-weight:800;
  cursor:pointer;
}

/* POSTS */
.post{
  padding:18px;
  border-bottom:1px solid #1e293b;
  transition:0.2s;
}

.post:hover{
  background:rgba(255,255,255,0.02);
}

/* ===== RIGHTBAR ===== */
.rightbar{
  width:320px;
  padding:20px;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
}

/* SEARCH */
.search-wrap input{
  width:100%;
  padding:12px 16px;
  border-radius:30px;
  border:1px solid #1e293b;
  background:#0b1220;
  color:white;
  outline:none;
}

/* TRENDING */
.trending-box{
  margin-top:20px;
  background:rgba(255,255,255,0.02);
  border:1px solid #1e293b;
  border-radius:18px;
  padding:18px;
}

.trending-box h3{
  margin-bottom:12px;
}

.trend-item{
  padding:10px 0;
  border-bottom:1px solid #1e293b;
}

.trend-item:last-child{
  border-bottom:none;
}

.trend-tag{
  font-weight:700;
}

.trend-count{
  color:#64748b;
  font-size:12px;
}

/* ROADMAP */
.roadmap{
  margin-top:20px;
  padding:18px;
  border:1px solid #1e293b;
  border-radius:18px;
  background:rgba(255,255,255,0.02);
}

.roadmap h3{
  margin-bottom:10px;
}

.step{
  padding:10px 0;
  border-left:2px solid #22d3ee;
  padding-left:10px;
  margin-bottom:8px;
  color:#cbd5e1;
}

/* MOBILE */
@media(max-width:900px){
  .rightbar{ display:none; }
  .sidebar{ width:80px; }
  .nav-item span:not(.nav-icon){ display:none; }
}
</style>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">🏠 NexFounder</div>

    <a class="nav-item active" href="home.html">
      <span class="nav-icon">🏠</span><span>Home</span>
    </a>

    <a class="nav-item" href="explore.html">
      <span class="nav-icon">🔍</span><span>Explore</span>
    </a>

    <a class="nav-item" href="notifications.html">
      <span class="nav-icon">🔔</span><span>Notifications</span>
    </a>

    <a class="nav-item" href="messages.html">
      <span class="nav-icon">💬</span><span>Messages</span>
    </a>

    <a class="nav-item" href="profile.html">
      <span class="nav-icon">👤</span><span>Profile</span>
    </a>

    <button class="post-btn">+ Post Idea</button>
  </aside>

  <!-- FEED -->
  <main class="feed-col">

    <div class="feed-header">
      <div class="feed-tabs">
        <div class="feed-tab active">For You</div>
        <div class="feed-tab">Following</div>
      </div>
    </div>

    <div class="create-post">
      <div class="create-avatar">?</div>
      <div class="create-right">
        <textarea placeholder="Share your startup idea..."></textarea>

        <div class="create-actions">
          <input type="file">
          <button>Post</button>
        </div>
      </div>
    </div>

    <div id="feed"></div>

  </main>

  <!-- RIGHTBAR -->
  <aside class="rightbar">

    <div class="search-wrap">
      <input id="searchInput" placeholder="Search founders...">
      <div id="searchResults"></div>
    </div>

    <div class="trending-box">
      <h3>Trending</h3>

      <div class="trend-item">
        <div class="trend-tag">#AI</div>
        <div class="trend-count">2.4k posts</div>
      </div>

      <div class="trend-item">
        <div class="trend-tag">#Projects</div>
        <div class="trend-count">1.8k posts</div>
      </div>

      <div class="trend-item">
        <div class="trend-tag">#Engineering</div>
        <div class="trend-count">1.1k posts</div>
      </div>
    </div>

    <!-- ROADMAP (NOW IN RIGHTBAR) -->
    <div class="roadmap">
      <h3>Roadmap</h3>

      <div class="step">Phase 1 — Core platform setup</div>
      <div class="step">Phase 2 — Idea & collaboration system</div>
      <div class="step">Phase 3 — Team building tools</div>
      <div class="step">Phase 4 — Growth system</div>
    </div>

  </aside>

</div>

<script type="module" src="home.js"></script>
</body>
</html>
