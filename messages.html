<!DOCTYPE html>
<html>
<head>
<title>Messages – NexFounder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:#0f172a; color:white; font-family:system-ui, Arial; }
.layout{ display:flex; min-height:100vh; max-width:1200px; margin:auto; }

/* SIDEBAR */
.sidebar{ width:260px; padding:20px; border-right:1px solid #1e293b; position:sticky; top:0; height:100vh; display:flex; flex-direction:column; gap:6px; }
.logo{ font-size:28px; font-weight:700; color:#22d3ee; padding:10px 14px; margin-bottom:10px; }
.nav-item{ display:flex; align-items:center; gap:14px; padding:13px 14px; border-radius:14px; text-decoration:none; color:white; font-size:17px; transition:0.2s; position:relative; }
.nav-item:hover{ background:#1e293b; }
.nav-item.active{ color:#22d3ee; font-weight:700; }
.nav-icon{ width:24px; text-align:center; }
.nav-badge{ position:absolute; right:14px; top:50%; transform:translateY(-50%); background:#f43f5e; color:white; font-size:11px; font-weight:700; border-radius:10px; padding:2px 7px; min-width:20px; text-align:center; display:none; }
.nav-badge.show{ display:block; }
.nav-user{ display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:14px; margin-top:auto; text-decoration:none; color:white; transition:0.2s; }
.nav-user:hover{ background:#1e293b; }
.nav-avatar{ width:42px; height:42px; border-radius:50%; background:#22d3ee; color:#0f172a; display:flex; align-items:center; justify-content:center; font-weight:700; overflow:hidden; }
.nav-user-name{ font-weight:600; font-size:14px; }
.nav-user-handle{ font-size:12px; color:#64748b; }

/* MESSAGES LAYOUT */
.msg-layout{ flex:1; display:flex; }

/* CONVERSATIONS LIST */
.conv-panel{ width:340px; border-right:1px solid #1e293b; display:flex; flex-direction:column; height:100vh; position:sticky; top:0; }
.conv-header{ padding:20px; border-bottom:1px solid #1e293b; font-size:18px; font-weight:700; }
.new-msg-btn{ width:100%; margin:12px 0 0; padding:10px; border:none; border-radius:20px; background:#2563eb; color:white; font-weight:700; cursor:pointer; }
.new-msg-btn:hover{ background:#3b82f6; }
.conv-search{ padding:12px 16px; border-bottom:1px solid #1e293b; }
.conv-search input{ width:100%; padding:10px 14px; border-radius:20px; border:1px solid #1e293b; background:#111827; color:white; outline:none; font-size:14px; }

.conv-list{ flex:1; overflow-y:auto; }
.conv-item{ display:flex; gap:12px; align-items:center; padding:14px 16px; cursor:pointer; border-bottom:1px solid #0f172a; transition:0.15s; }
.conv-item:hover{ background:#1e293b; }
.conv-item.active{ background:#1e293b; border-left:3px solid #22d3ee; }
.conv-item.unread .conv-preview{ color:white; font-weight:600; }
.conv-avatar{ width:44px; height:44px; border-radius:50%; background:#2563eb; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; overflow:hidden; }
.conv-avatar img{ width:100%; height:100%; object-fit:cover; border-radius:50%; }
.conv-name{ font-weight:600; font-size:14px; }
.conv-preview{ color:#64748b; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:180px; }
.conv-time{ color:#64748b; font-size:11px; margin-left:auto; align-self:flex-start; white-space:nowrap; }
.unread-dot{ width:8px; height:8px; background:#22d3ee; border-radius:50%; margin-left:auto; flex-shrink:0; }

/* CHAT PANEL */
.chat-panel{ flex:1; display:flex; flex-direction:column; height:100vh; }
.chat-header{ padding:16px 20px; border-bottom:1px solid #1e293b; display:flex; align-items:center; gap:12px; position:sticky; top:0; background:#0f172a; z-index:10; }
.chat-header-avatar{ width:40px; height:40px; border-radius:50%; background:#2563eb; display:flex; align-items:center; justify-content:center; font-weight:700; overflow:hidden; }
.chat-header-avatar img{ width:100%; height:100%; object-fit:cover; border-radius:50%; }
.chat-header-name{ font-weight:700; font-size:16px; }
.chat-header-sub{ font-size:12px; color:#64748b; }
.view-profile-link{ margin-left:auto; color:#64748b; font-size:13px; text-decoration:none; }
.view-profile-link:hover{ color:#22d3ee; }

.messages-area{ flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:10px; }
.msg-bubble{ max-width:65%; padding:12px 16px; border-radius:20px; line-height:1.5; word-wrap:break-word; font-size:15px; }
.msg-mine{ align-self:flex-end; background:#2563eb; border-radius:20px 20px 4px 20px; }
.msg-other{ align-self:flex-start; background:#1e293b; border-radius:20px 20px 20px 4px; }
.msg-time{ font-size:11px; color:rgba(255,255,255,0.5); margin-top:4px; text-align:right; }
.msg-other .msg-time{ text-align:left; }

.send-area{ padding:16px 20px; border-top:1px solid #1e293b; display:flex; gap:12px; align-items:center; }
.send-area input{ flex:1; padding:14px 18px; border:1px solid #1e293b; border-radius:30px; background:#111827; color:white; outline:none; font-size:15px; }
.send-area input:focus{ border-color:#22d3ee; }
.send-area button{ padding:14px 22px; border:none; border-radius:30px; background:#2563eb; color:white; font-weight:700; cursor:pointer; transition:0.2s; }
.send-area button:hover{ background:#3b82f6; }

/* EMPTY CHAT STATE */
.chat-empty{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#64748b; }
.chat-empty div{ font-size:48px; margin-bottom:16px; }

/* NEW MESSAGE MODAL */
.modal-overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; justify-content:center; align-items:center; }
.modal-overlay.open{ display:flex; }
.modal{ background:#0f172a; border:1px solid #1e293b; border-radius:22px; padding:24px; width:100%; max-width:440px; }
.modal h3{ margin-bottom:16px; }
.modal input{ width:100%; padding:12px 16px; border:1px solid #1e293b; border-radius:14px; background:#111827; color:white; outline:none; margin-bottom:12px; }
.modal-list{ max-height:280px; overflow-y:auto; }
.modal-user{ display:flex; gap:12px; align-items:center; padding:12px; border-radius:14px; cursor:pointer; }
.modal-user:hover{ background:#1e293b; }
.modal-avatar{ width:40px; height:40px; border-radius:50%; background:#2563eb; display:flex; align-items:center; justify-content:center; font-weight:700; overflow:hidden; flex-shrink:0; }
.modal-close{ float:right; background:none; border:none; color:#64748b; font-size:22px; cursor:pointer; line-height:1; }

@media(max-width:900px){
  .sidebar{ width:76px; padding:10px; }
  .nav-item span:not(.nav-icon){ display:none; }
  .nav-user-info{ display:none; }
  .logo{ font-size:20px; padding:10px; }
  .conv-panel{ width:80px; }
  .conv-name, .conv-preview, .conv-time{ display:none; }
}
</style>
</head>
<body>
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">NexFounder</div>
    <a class="nav-item" href="home.html"><span class="nav-icon">🏠</span><span>Home</span></a>
    <a class="nav-item" href="explore.html"><span class="nav-icon">🔍</span><span>Explore</span></a>
    <a class="nav-item" href="notifications.html">
      <span class="nav-icon">🔔</span><span>Notifications</span>
      <span class="nav-badge" id="notifBadge"></span>
    </a>
    <a class="nav-item active" href="messages.html">
      <span class="nav-icon">💬</span><span>Messages</span>
      <span class="nav-badge" id="msgBadge"></span>
    </a>
    <a class="nav-item" href="profile.html"><span class="nav-icon">👤</span><span>Profile</span></a>
    <a class="nav-user" href="profile.html">
      <div class="nav-avatar" id="navAvatar">?</div>
      <div class="nav-user-info">
        <div class="nav-user-name" id="navName">Loading...</div>
        <div class="nav-user-handle">View Profile</div>
      </div>
    </a>
  </aside>

  <!-- MESSAGES -->
  <div class="msg-layout">

    <!-- CONVERSATION LIST -->
    <div class="conv-panel">
      <div class="conv-header">
        Messages
        <button class="new-msg-btn" id="newMsgBtn">✏️ New Message</button>
      </div>
      <div class="conv-search">
        <input type="text" id="convSearch" placeholder="Search conversations...">
      </div>
      <div class="conv-list" id="convList">
        <div style="padding:30px;text-align:center;color:#64748b">Loading...</div>
      </div>
    </div>

    <!-- CHAT PANEL -->
    <div class="chat-panel" id="chatPanel">
      <div class="chat-empty">
        <div>💬</div>
        <p>Select a conversation or start a new one</p>
      </div>
    </div>

  </div>
</div>

<!-- NEW MESSAGE MODAL -->
<div class="modal-overlay" id="newMsgModal">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <h3>New Message</h3>
    <input type="text" id="modalSearch" placeholder="Search users...">
    <div class="modal-list" id="modalUserList"></div>
  </div>
</div>

<script type="module" src="messages.js"></script>
</body>
</html>
