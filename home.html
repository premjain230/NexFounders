<!DOCTYPE html>
<html>
<head>
<title>NexFounder – Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, Arial;
}

body{
  background:#0b1220;
  color:white;
  overflow-x:hidden;
}

/* smooth scroll */
html{
  scroll-behavior:smooth;
}

/* scrollbar dark style */
::-webkit-scrollbar{
  width:10px;
}
::-webkit-scrollbar-track{
  background:#0b1220;
}
::-webkit-scrollbar-thumb{
  background:#1e293b;
  border-radius:10px;
}
::-webkit-scrollbar-thumb:hover{
  background:#334155;
}

/* layout */
.layout{
  display:flex;
  min-height:100vh;
  max-width:1200px;
  margin:auto;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  padding:20px;
  border-right:1px solid #1e293b;
  position:sticky;
  top:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  gap:6px;
  background:rgba(2,6,23,0.7);
  backdrop-filter:blur(10px);
  animation:slideLeft 0.5s ease;
}

@keyframes slideLeft{
  from{transform:translateX(-20px);opacity:0;}
  to{transform:translateX(0);opacity:1;}
}

.logo{
  font-size:26px;
  font-weight:800;
  color:#22d3ee;
  padding:10px 14px;
  margin-bottom:10px;
}

/* nav */
.nav-item{
  display:flex;
  align-items:center;
  gap:14px;
  padding:13px 14px;
  border-radius:14px;
  text-decoration:none;
  color:white;
  font-size:16px;
  transition:0.2s;
  position:relative;
}

.nav-item:hover{
  background:#1e293b;
  transform:translateX(3px);
}

.nav-item.active{
  color:#22d3ee;
  font-weight:700;
}

/* white style icons */
.nav-icon{
  width:24px;
  text-align:center;
  color:#e2e8f0;
}

/* badge */
.nav-badge{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  background:#f43f5e;
  color:white;
  font-size:11px;
  font-weight:700;
  border-radius:10px;
  padding:2px 7px;
  display:none;
}
.nav-badge.show{ display:block; }

/* post button */
.post-btn{
  margin-top:auto;
  padding:14px;
  border:none;
  border-radius:30px;
  background:#2563eb;
  color:white;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

.post-btn:hover{
  background:#3b82f6;
  transform:scale(1.03);
}

/* user */
.nav-user{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  border-radius:14px;
  margin-top:10px;
  text-decoration:none;
  color:white;
  transition:0.2s;
}

.nav-user:hover{
  background:#1e293b;
}

/* FEED */
.feed-col{
  flex:1;
  border-right:1px solid #1e293b;
  min-height:100vh;
  animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

.feed-header{
  position:sticky;
  top:0;
  z-index:20;
  background:rgba(2,6,23,0.85);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #1e293b;
}

.feed-tabs{
  display:flex;
}

.feed-tab{
  flex:1;
  text-align:center;
  padding:18px;
  color:#64748b;
  font-weight:600;
  border-bottom:2px solid transparent;
  cursor:pointer;
  transition:0.2s;
}

.feed-tab:hover{
  background:#0f172a;
}

.feed-tab.active{
  color:white;
  border-bottom:2px solid #2563eb;
}

/* create post */
.create-post{
  padding:18px 20px;
  border-bottom:1px solid #1e293b;
  display:flex;
  gap:12px;
}

.create-avatar{
  width:46px;
  height:46px;
  border-radius:50%;
  background:#22d3ee;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  color:#0b1220;
}

.create-right{
  flex:1;
}

.create-right textarea{
  width:100%;
  background:transparent;
  border:none;
  outline:none;
  color:white;
  resize:none;
  font-size:16px;
  min-height:70px;
}

.create-actions{
  margin-top:10px;
  border-top:1px solid #1e293b;
  padding-top:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.create-actions button{
  padding:10px 22px;
  border:none;
  border-radius:24px;
  background:#2563eb;
  color:white;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

.create-actions button:hover{
  background:#3b82f6;
}

/* POSTS animation */
.post{
  padding:18px 20px;
  border-bottom:1px solid #1e293b;
  transition:0.2s;
  animation:postIn 0.3s ease;
}

@keyframes postIn{
  from{transform:translateY(10px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

.post:hover{
  background:#0f172a;
}

/* RIGHTBAR */
.rightbar{
  width:320px;
  padding:20px;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  background:rgba(2,6,23,0.5);
  backdrop-filter:blur(10px);
}

/* search */
.search-wrap input{
  width:100%;
  padding:12px 18px;
  border-radius:30px;
  border:1px solid #1e293b;
  background:#0f172a;
  color:white;
}

/* ROADMAPS (replaces trending) */
.roadmap-box{
  margin-top:20px;
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:18px;
  padding:16px;
}

.roadmap-box h3{
  margin-bottom:12px;
  color:#22d3ee;
}

.road-item{
  padding:12px 0;
  border-bottom:1px solid #1e293b;
}

.road-item:last-child{
  border-bottom:none;
}

.road-title{
  font-weight:700;
}

.road-desc{
  color:#64748b;
  font-size:13px;
  margin-top:2px;
}

/* mobile */
@media(max-width:900px){
  .rightbar{ display:none; }
  .sidebar{ width:80px; }
  .nav-item span:not(.nav-icon){ display:none; }
}
  /* ✅ FIX 3-COLUMN LAYOUT BREAK ISSUE */
.layout{
  display:flex;
  min-height:100vh;
  max-width:1200px;
  margin:auto;
  overflow:hidden;
}

/* LEFT SIDEBAR */
.sidebar{
  flex:0 0 260px;
}

/* MIDDLE FEED (IMPORTANT FIX) */
.feed-col{
  flex:1;
  min-width:0; /* 🔥 CRITICAL FIX */
  border-right:1px solid #1e293b;
  overflow-y:auto;
}

/* RIGHT BAR */
.rightbar{
  flex:0 0 320px;
  min-width:320px;
  overflow-y:auto;
}

/* POSTS FIX (PREVENT OVERFLOW) */
.post{
  max-width:100%;
  word-break:break-word;
}

/* IMAGES ALSO SAFE */
.post img,
.post video{
  max-width:100%;
  border-radius:12px;
}

/* FEED HEADER STICK FIX */
.feed-header{
  position:sticky;
  top:0;
  z-index:50;
}
</style>
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">NexFounder</div>

  <a class="nav-item active" href="home.html">
    <span class="nav-icon">⬢</span><span>Home</span>
  </a>

  <a class="nav-item" href="explore.html">
    <span class="nav-icon">⌕</span><span>Explore</span>
  </a>

  <a class="nav-item" href="notifications.html">
    <span class="nav-icon">⎔</span><span>Notifications</span>
    <span class="nav-badge" id="notifBadge"></span>
  </a>

  <a class="nav-item" href="messages.html">
    <span class="nav-icon">✉</span><span>Messages</span>
    <span class="nav-badge" id="msgBadge"></span>
  </a>

  <a class="nav-item" href="profile.html">
    <span class="nav-icon">◉</span><span>Profile</span>
  </a>

  <button class="post-btn" onclick="document.getElementById('postInput').focus()">
    + Post
  </button>
</aside>

<!-- FEED -->
<main class="feed-col">

  <div class="feed-header">
    <div class="feed-tabs">
      <div class="feed-tab active">For You</div>
      <div class="feed-tab">Following</div>
    </div>
  </div>

  <div class="create-post">
    <div class="create-avatar">P</div>
    <div class="create-right">
      <textarea id="postInput" placeholder="Share your startup idea..."></textarea>
      <div class="create-actions">
        <input type="file" id="mediaInput" accept="image/*,video/*">
        <button id="postBtn">Post</button>
      </div>
    </div>
  </div>

  <div id="feed"></div>

</main>

<!-- RIGHTBAR -->
<aside class="rightbar">

  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search founders...">
  </div>

  <!-- ROADMAPS -->
  <div class="roadmap-box">
    <h3>Roadmaps</h3>

    <div class="road-item">
      <div class="road-title">MVP Launch</div>
      <div class="road-desc">Build first working version</div>
    </div>

    <div class="road-item">
      <div class="road-title">User Growth</div>
      <div class="road-desc">Reach first 1k users</div>
    </div>

    <div class="road-item">
      <div class="road-title">Monetization</div>
      <div class="road-desc">Start revenue system</div>
    </div>

    <div class="road-item">
      <div class="road-title">Scale</div>
      <div class="road-desc">Expand globally</div>
    </div>

  </div>

</aside>

</div>

<script type="module" src="home.js"></script>
</body>
</html>
