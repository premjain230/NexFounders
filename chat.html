<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat — NexFounder</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,system-ui,sans-serif;
}

body{
  background:#000;
  color:white;
  overflow:hidden;
}

/* APP */
.chat-layout{
  max-width:700px;
  margin:auto;
  height:100vh;
  display:flex;
  flex-direction:column;
  border-left:1px solid #1e293b;
  border-right:1px solid #1e293b;
  background:#000;
}

/* HEADER */
.chat-header{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(0,0,0,0.92);
  backdrop-filter:blur(10px);

  display:flex;
  align-items:center;
  gap:14px;

  padding:14px 18px;

  border-bottom:1px solid #1e293b;
}

.back-btn{
  color:white;
  text-decoration:none;
  font-size:22px;
  font-weight:700;
}

.chat-avatar{
  width:46px;
  height:46px;
  border-radius:50%;
  background:#38bdf8;

  overflow:hidden;

  display:flex;
  align-items:center;
  justify-content:center;

  font-weight:800;
  color:black;

  flex-shrink:0;
}

.chat-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.chat-info{
  flex:1;
}

.chat-name{
  font-weight:800;
  font-size:16px;
}

.chat-username{
  font-size:13px;
  color:#94a3b8;
  margin-top:2px;
}

/* MESSAGES */
.messages-area{
  flex:1;
  overflow-y:auto;

  padding:20px;

  display:flex;
  flex-direction:column;
  gap:10px;
}

/* MESSAGE */
.msg-wrap{
  display:flex;
  flex-direction:column;
}

.msg-mine{
  align-items:flex-end;
}

.msg-other{
  align-items:flex-start;
}

.msg-bubble{
  max-width:75%;

  padding:12px 16px;

  border-radius:20px;

  line-height:1.5;
  font-size:15px;

  word-wrap:break-word;

  animation:pop 0.15s ease;
}

@keyframes pop{

  from{
    opacity:0;
    transform:scale(0.95);
  }

  to{
    opacity:1;
    transform:scale(1);
  }

}

.msg-mine .msg-bubble{
  background:#38bdf8;
  color:black;
  border-radius:20px 20px 6px 20px;
}

.msg-other .msg-bubble{
  background:#111827;
  color:white;
  border-radius:20px 20px 20px 6px;
}

.msg-time{
  font-size:11px;
  color:#64748b;
  margin-top:4px;
  padding:0 6px;
}

/* SEND */
.send-area{
  padding:14px 16px;
  border-top:1px solid #1e293b;

  display:flex;
  align-items:center;
  gap:12px;

  background:#000;
}

.msg-input{
  flex:1;

  background:#0f172a;
  border:none;
  outline:none;

  color:white;

  padding:14px 16px;

  border-radius:999px;

  font-size:15px;
}

.send-btn{
  border:none;
  background:#38bdf8;
  color:black;

  padding:14px 20px;

  border-radius:999px;

  font-weight:800;

  cursor:pointer;
}

/* EMPTY */
.empty{
  flex:1;

  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;

  color:#64748b;
}

.empty div{
  font-size:50px;
  margin-bottom:12px;
}

/* SCROLLBAR */
::-webkit-scrollbar{
  width:6px;
}

::-webkit-scrollbar-thumb{
  background:#1e293b;
  border-radius:999px;
}

</style>
</head>

<body>

<div class="chat-layout">

  <!-- HEADER -->
  <div class="chat-header">

    <a
    href="messages.html"
    class="back-btn">
      ←
    </a>

    <div
    class="chat-avatar"
    id="chatAvatar">
      ?
    </div>

    <div class="chat-info">

      <div
      class="chat-name"
      id="chatName">
        Loading...
      </div>

      <div
      class="chat-username"
      id="chatUsername">
        @user
      </div>

    </div>

  </div>

  <!-- MESSAGES -->
  <div
  class="messages-area"
  id="messagesArea">

    <div class="empty">

      <div>💬</div>

      <p>Loading messages...</p>

    </div>

  </div>

  <!-- SEND -->
  <div class="send-area">

    <input
    type="text"
    id="msgInput"
    class="msg-input"
    placeholder="Message...">

    <button
    id="sendBtn"
    class="send-btn">
      Send
    </button>

  </div>

</div>

<script type="module" src="chat.js"></script>

</body>
</html>
