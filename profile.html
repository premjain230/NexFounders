<!doctype html>
<html>
<head>
<title>NexFounder Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:system-ui, Arial;
}

/* Navbar */
.navbar{
    height:70px;
    background:#111827;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 25px;
}

.logo{
    font-size:24px;
    font-weight:700;
    color:#22d3ee;
}

.navlinks{
    display:flex;
    gap:20px;
}

.navlinks a{
    text-decoration:none;
    color:#cbd5e1;
}

.navlinks a:hover{
    color:#22d3ee;
}

/* Container */
.container{
    max-width:900px;
    margin:auto;
    padding:25px;
}

/* Profile Card */
.profilecard{
    background:#111827;
    border:1px solid #1f2937;
    border-radius:24px;
    overflow:hidden;
}

.banner{
    height:220px;
    background:linear-gradient(135deg,#2563eb,#06b6d4,#7c3aed);
    position:relative;
}

.profilepic{
    width:130px;
    height:130px;
    border-radius:50%;
    background:#0f172a;
    border:4px solid #111827;
    position:absolute;
    bottom:-65px;
    left:30px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    font-weight:700;
}

.profilecontent{
    padding:85px 30px 30px;
}

.name{font-size:32px;font-weight:700;}
.username{color:#94a3b8;}
.email{color:#64748b;font-size:14px;}

.btn-row{
    display:flex;
    gap:10px;
}

.editbtn,
.followbtn{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.editbtn{
    background:#2563eb;
    color:white;
}

.followbtn{
    background:#22d3ee;
    color:#0f172a;
    font-weight:700;
}

.followbtn.following{
    background:transparent;
    color:#94a3b8;
    border:1px solid #1e293b;
}

.bio{margin-top:20px;color:#cbd5e1;}

.stats{
    display:flex;
    gap:18px;
    margin-top:25px;
}

.statbox{
    background:#0f172a;
    border:1px solid #1e293b;
    padding:14px 22px;
    border-radius:16px;
}

.statnumber{font-size:20px;font-weight:700;}
.statlabel{color:#94a3b8;font-size:14px;}

/* Posts */
.postsection{margin-top:25px;}

.empty{
    background:#111827;
    border:1px solid #1f2937;
    border-radius:20px;
    padding:40px;
    text-align:center;
    color:#94a3b8;
}

/* Modal */
.modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.modal-overlay.open{display:flex;}

.modal{
    background:#111827;
    padding:28px;
    border-radius:16px;
    width:100%;
    max-width:480px;
}

.field{
    margin-bottom:15px;
}

.field input,
.field textarea{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #1e293b;
    background:#0f172a;
    color:white;
}

.modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
}

.savebtn,
.cancelbtn{
    padding:10px 16px;
    border-radius:10px;
    border:none;
    cursor:pointer;
}

.savebtn{
    background:#2563eb;
    color:white;
}

.cancelbtn{
    background:transparent;
    border:1px solid #1e293b;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">NexFounder</div>
    <div class="navlinks">
        <a href="home.html">Home</a>
        <a href="profile.html">Profile</a>
    </div>
</div>

<div class="container">

<div class="profilecard">

<div class="banner">
    <div class="profilepic" id="avatar"></div>
</div>

<div class="profilecontent">

<div class="name" id="displayName"></div>
<div class="username" id="displayUsername"></div>
<div class="email" id="displayEmail"></div>

<div class="btn-row">
    <button class="followbtn" id="followBtn">Follow</button>
    <button class="editbtn" id="openEditBtn">Edit Profile</button>
</div>

<div class="bio" id="displayBio"></div>

<div class="stats">
    <div class="statbox">
        <div class="statnumber" id="followersCount">0</div>
        <div class="statlabel">Followers</div>
    </div>
    <div class="statbox">
        <div class="statnumber" id="followingCount">0</div>
        <div class="statlabel">Following</div>
    </div>
</div>

</div>
</div>

<div class="postsection" id="userPosts">
    <div class="empty">Loading posts...</div>
</div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="editModal">
<div class="modal">

<div class="field">
<input id="inputName" placeholder="Name">
</div>

<div class="field">
<input id="inputUsername" placeholder="Username">
</div>

<div class="field">
<textarea id="inputBio" placeholder="Bio"></textarea>
</div>

<div class="modal-actions">
<button class="cancelbtn" id="cancelBtn">Cancel</button>
<button class="savebtn" id="saveBtn">Save</button>
</div>

</div>
</div>

<script type="module" src="profile.js"></script>

</body>
</html>
