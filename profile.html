<!DOCTYPE html>
<html>
<head>
<title>NexFounder Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:system-ui, Arial;
}

.navbar{
    height:70px;
    background:#111827;
    border-bottom:1px solid #1f2937;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 25px;
}

.logo{
    font-size:24px;
    font-weight:700;
    color:#22d3ee;
}

.navlinks{
    display:flex;
    gap:20px;
}

.navlinks a{
    text-decoration:none;
    color:#cbd5e1;
}

.container{
    max-width:900px;
    margin:auto;
    padding:25px;
}

.profilecard{
    background:#111827;
    border:1px solid #1f2937;
    border-radius:24px;
    overflow:hidden;
}

.banner{
    height:220px;
    background:linear-gradient(135deg,#2563eb,#06b6d4,#7c3aed);
    position:relative;
}

.profilepic{
    width:130px;
    height:130px;
    border-radius:50%;
    background:#22d3ee;
    color:#0f172a;
    border:6px solid #111827;
    position:absolute;
    bottom:-65px;
    left:30px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:34px;
    font-weight:700;
}

.profilecontent{
    padding:85px 30px 30px;
}

.top{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
}

.name{font-size:32px;font-weight:700;}
.username{color:#94a3b8;}

.editbtn{
    padding:12px 18px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-weight:600;
    cursor:pointer;
}

.followbtn{
    padding:12px 18px;
    border:none;
    border-radius:12px;
    background:#22d3ee;
    color:#0f172a;
    font-weight:700;
    cursor:pointer;
}

.followbtn.following{
    background:transparent;
    color:#94a3b8;
    border:1px solid #1e293b;
}

.bio{margin-top:20px;color:#cbd5e1;}

.stats{
    display:flex;
    gap:18px;
    margin-top:25px;
}

.statbox{
    background:#0f172a;
    border:1px solid #1e293b;
    padding:14px 22px;
    border-radius:16px;
}

.statnumber{font-size:20px;font-weight:700;}
.statlabel{color:#94a3b8;font-size:14px;}

.modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.modal-overlay.open{display:flex;}

.modal{
    background:#111827;
    padding:20px;
    border-radius:16px;
    width:90%;
    max-width:400px;
}

.field input,.field textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    background:#0f172a;
    border:1px solid #1e293b;
    color:white;
    border-radius:8px;
}

.savebtn{
    margin-top:10px;
    width:100%;
    padding:10px;
    background:#2563eb;
    border:none;
    color:white;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">NexFounder</div>
    <div class="navlinks">
        <a href="home.html">Home</a>
        <a href="profile.html">Profile</a>
    </div>
</div>

<div class="container">

    <div class="profilecard">

        <div class="banner">
            <div class="profilepic" id="avatar"></div>
        </div>

        <div class="profilecontent">

            <div class="top">
                <div>
                    <div class="name" id="displayName"></div>
                    <div class="username" id="displayUsername"></div>
                </div>

                <div>
                    <button class="followbtn" id="followBtn">Follow</button>
                    <button class="editbtn" id="openEditBtn">Edit</button>
                </div>
            </div>

            <div class="bio" id="displayBio"></div>

            <div class="stats">
                <div class="statbox">
                    <div class="statnumber" id="followersCount">0</div>
                    <div class="statlabel">Followers</div>
                </div>

                <div class="statbox">
                    <div class="statnumber" id="followingCount">0</div>
                    <div class="statlabel">Following</div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
    <div class="modal">

        <div class="field">
            <label>Name</label>
            <input id="inputName">
        </div>

        <div class="field">
            <label>Username</label>
            <input id="inputUsername">
        </div>

        <div class="field">
            <label>Bio</label>
            <textarea id="inputBio"></textarea>
        </div>

        <button class="savebtn" id="saveBtn">Save</button>

    </div>
</div>

<script type="module">
import { auth, db } from "./firebase.js";

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
doc,
getDoc,
updateDoc,
arrayUnion,
arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


let currentUser = null;
let profileUserId = null;
let profileData = null;

// ── GET UID FROM URL ───────────────────────
const urlParams = new URLSearchParams(window.location.search);
profileUserId = urlParams.get("uid");

// fallback → if no uid, show your own profile
if (!profileUserId) {
    profileUserId = null;
}

// ── AUTH ───────────────────────────────────
onAuthStateChanged(auth, async (user) => {

if (!user) {
    window.location.href = "index.html";
    return;
}

currentUser = user;

// if no uid in URL → show self profile
if (!profileUserId) {
    profileUserId = user.uid;
}

await loadProfile(profileUserId);

});


// ── LOAD PROFILE ───────────────────────────
async function loadProfile(uid) {

const ref = doc(db, "users", uid);
const snap = await getDoc(ref);

if (!snap.exists()) return;

profileData = snap.data();

// UI update
document.getElementById("displayName").innerText = profileData.displayName;
document.getElementById("displayUsername").innerText = "@" + profileData.username;
document.getElementById("displayBio").innerText = profileData.bio || "";
document.getElementById("avatar").innerText = profileData.initials;

document.getElementById("followersCount").innerText =
(profileData.followers || []).length;

document.getElementById("followingCount").innerText =
(profileData.following || []).length;


// ── EDIT BUTTON ONLY FOR SELF ─────────────
if (currentUser.uid === uid) {
    document.getElementById("openEditBtn").style.display = "inline-block";
} else {
    document.getElementById("openEditBtn").style.display = "none";
}


// ── FOLLOW BUTTON STATE ───────────────────
const isFollowing =
(profileData.followers || []).includes(currentUser.uid);

const followBtn = document.getElementById("followBtn");

if (currentUser.uid === uid) {
    followBtn.style.display = "none"; // can't follow yourself
} else {
    followBtn.style.display = "inline-block";

    if (isFollowing) {
        followBtn.classList.add("following");
        followBtn.innerText = "Following";
    } else {
        followBtn.classList.remove("following");
        followBtn.innerText = "Follow";
    }
}


// ── FOLLOW CLICK ──────────────────────────
followBtn.onclick = async () => {

const userRef = doc(db, "users", uid);
const myRef = doc(db, "users", currentUser.uid);

const isNowFollowing =
profileData.followers?.includes(currentUser.uid);

if (isNowFollowing) {

    await updateDoc(userRef, {
        followers: arrayRemove(currentUser.uid)
    });

    await updateDoc(myRef, {
        following: arrayRemove(uid)
    });

} else {

    await updateDoc(userRef, {
        followers: arrayUnion(currentUser.uid)
    });

    await updateDoc(myRef, {
        following: arrayUnion(uid)
    });

}

// reload profile
loadProfile(uid);

};


// ── EDIT PROFILE ──────────────────────────
document.getElementById("saveBtn").onclick = async () => {

if (currentUser.uid !== profileUserId) return;

const name = inputName.value;
const username = inputUsername.value;
const bio = inputBio.value;

const initials = name.split(" ").map(w => w[0]).join("").toUpperCase();

await updateDoc(doc(db, "users", currentUser.uid), {
    displayName: name,
    username: username,
    bio: bio,
    initials: initials
});

loadProfile(currentUser.uid);

document.getElementById("editModal").classList.remove("open");
};


// ── OPEN EDIT MODAL ───────────────────────
document.getElementById("openEditBtn").onclick = () => {
document.getElementById("editModal").classList.add("open");
};
</script>

</body>
</html>
