<!DOCTYPE html>
<html>
<head>
<title>NexFounder</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* AVATAR IMAGES */
.nav-avatar-img,
.post-avatar-img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
}

.create-avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
    display:block;
}

.search-avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
    display:block;
}

body{
    background:#0f172a;
    color:white;
    font-family:system-ui, Arial;
}

/* ───────────────── LAYOUT ───────────────── */

.layout{
    display:flex;
    min-height:100vh;
    max-width:1200px;
    margin:auto;
}

/* ───────────────── SIDEBAR ───────────────── */

.sidebar{
    width:260px;
    padding:20px;
    border-right:1px solid #1e293b;
    position:sticky;
    top:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    gap:6px;
}

.logo{
    font-size:28px;
    font-weight:700;
    color:#22d3ee;
    padding:10px 14px;
    margin-bottom:10px;
}

.nav-item{
    display:flex;
    align-items:center;
    gap:14px;
    padding:13px 14px;
    border-radius:14px;
    text-decoration:none;
    color:white;
    font-size:17px;
    transition:0.2s;
}

.nav-item:hover{
    background:#1e293b;
}

.nav-item.active{
    color:#22d3ee;
    font-weight:700;
}

.nav-icon{
    width:24px;
    text-align:center;
}

.post-btn{
    margin-top:auto;
    padding:14px;
    border:none;
    border-radius:30px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
}

.post-btn:hover{
    background:#3b82f6;
}

.nav-user{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 14px;
    border-radius:14px;
    margin-top:10px;
    text-decoration:none;
    color:white;
    transition:0.2s;
}

.nav-user:hover{
    background:#1e293b;
}

.nav-avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    background:#22d3ee;
    color:#0f172a;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    overflow:hidden;
}

.nav-user-name{
    font-weight:600;
    font-size:14px;
}

.nav-user-handle{
    font-size:12px;
    color:#64748b;
}

/* ───────────────── FEED ───────────────── */

.feed-col{
    flex:1;
    border-right:1px solid #1e293b;
    min-height:100vh;
}

.feed-header{
    position:sticky;
    top:0;
    z-index:20;
    background:rgba(15,23,42,0.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid #1e293b;
}

.feed-tabs{
    display:flex;
}

.feed-tab{
    flex:1;
    text-align:center;
    padding:18px;
    color:#64748b;
    font-weight:600;
    border-bottom:2px solid transparent;
}

.feed-tab.active{
    color:white;
    border-bottom:2px solid #2563eb;
}

/* ───────────────── CREATE POST ───────────────── */

.create-post{
    padding:18px 20px;
    border-bottom:1px solid #1e293b;
    display:flex;
    gap:12px;
}

.create-avatar{
    width:46px;
    height:46px;
    border-radius:50%;
    background:#22d3ee;
    color:#0f172a;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    flex-shrink:0;
    overflow:hidden;
}

.create-right{
    flex:1;
}

.create-right textarea{
    width:100%;
    background:transparent;
    border:none;
    outline:none;
    color:white;
    resize:none;
    font-size:17px;
    min-height:70px;
    font-family:inherit;
}

.create-right textarea::placeholder{
    color:#64748b;
}

.create-actions{
    margin-top:10px;
    border-top:1px solid #1e293b;
    padding-top:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
}

#mediaInput{
    color:white;
    font-size:13px;
}

.create-actions button{
    padding:10px 22px;
    border:none;
    border-radius:24px;
    background:#2563eb;
    color:white;
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
}

.create-actions button:hover{
    background:#3b82f6;
}

/* ───────────────── POSTS ───────────────── */

.post{
    padding:18px 20px;
    border-bottom:1px solid #1e293b;
    transition:0.15s;
}

.post:hover{
    background:#111827;
}

.post-header{
    display:flex;
    gap:12px;
    margin-bottom:10px;
}

.post-avatar{
    width:44px;
    height:44px;
    border-radius:50%;
    background:#2563eb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    flex-shrink:0;
    overflow:hidden;
}

.post-name{
    font-weight:700;
}

.profile-link{
    color:white;
    text-decoration:none;
}

.profile-link:hover{
    color:#22d3ee;
}

.post-username{
    color:#64748b;
    font-size:13px;
    margin-top:2px;
}

.post-text{
    margin-left:56px;
    line-height:1.7;
    color:#e2e8f0;
    font-size:16px;
}

/* MEDIA */

.post-image{
    width:100%;
    margin-top:14px;
    border-radius:18px;
    max-height:500px;
    object-fit:cover;
    border:1px solid #1e293b;
}

.post-video{
    width:100%;
    margin-top:14px;
    border-radius:18px;
    border:1px solid #1e293b;
}

/* ACTIONS */

.post-actions{
    display:flex;
    gap:18px;
    margin-top:14px;
    margin-left:56px;
}

.like-btn{
    background:none;
    border:none;
    color:#64748b;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
    padding:8px 12px;
    border-radius:20px;
    transition:0.2s;
}

.like-btn:hover{
    background:#1e293b;
    color:#f43f5e;
}

.like-btn.liked{
    color:#f43f5e;
}

/* COMMENTS */

.comments-section{
    margin-left:56px;
    margin-top:14px;
}

.comments-list{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:10px;
}

.comment{
    background:#111827;
    border:1px solid #1e293b;
    padding:10px 14px;
    border-radius:14px;
    font-size:14px;
    color:#e2e8f0;
}

.comment-input-wrap{
    display:flex;
    gap:10px;
}

.comment-input{
    flex:1;
    background:#111827;
    border:1px solid #1e293b;
    border-radius:20px;
    padding:10px 14px;
    color:white;
    outline:none;
}

.comment-btn{
    border:none;
    background:#2563eb;
    color:white;
    padding:10px 16px;
    border-radius:20px;
    cursor:pointer;
    font-weight:700;
}

/* ───────────────── RIGHTBAR ───────────────── */

.rightbar{
    width:320px;
    padding:20px;
    position:sticky;
    top:0;
    height:100vh;
}

.search-wrap{
    position:relative;
    margin-bottom:20px;
}

.search-wrap input{
    width:100%;
    padding:12px 18px;
    border-radius:30px;
    border:1px solid #1e293b;
    background:#111827;
    color:white;
    outline:none;
}

#searchResults{
    display:none;
    position:absolute;
    top:105%;
    left:0;
    right:0;
    background:#111827;
    border:1px solid #1e293b;
    border-radius:16px;
    overflow:hidden;
    z-index:50;
}

.search-result{
    display:flex;
    gap:12px;
    align-items:center;
    padding:12px 16px;
    cursor:pointer;
}

.search-result:hover{
    background:#1e293b;
}

.search-avatar{
    width:38px;
    height:38px;
    border-radius:50%;
    background:#2563eb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    overflow:hidden;
}

.trending-box{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:20px;
    padding:18px;
}

.trending-box h3{
    margin-bottom:16px;
}

.trend-item{
    padding:12px 0;
    border-bottom:1px solid #1e293b;
}

.trend-item:last-child{
    border-bottom:none;
}

.trend-tag{
    font-weight:700;
}

.trend-count{
    color:#64748b;
    font-size:13px;
    margin-top:2px;
}

/* ───────────────── MOBILE ───────────────── */

@media(max-width:900px){

    .rightbar{
        display:none;
    }

    .sidebar{
        width:76px;
        padding:10px;
    }

    .nav-item span:not(.nav-icon){
        display:none;
    }

    .nav-user-info{
        display:none;
    }

    .logo{
        font-size:20px;
        padding:10px;
    }
}

</style>
</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <div class="logo">NexFounder</div>

        <a class="nav-item active" href="home.html">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>

        <a class="nav-item" href="#">
            <span class="nav-icon">🔍</span>
            <span>Explore</span>
        </a>

        <a class="nav-item" href="#">
            <span class="nav-icon">🔔</span>
            <span>Notifications</span>
        </a>

        <a class="nav-item" href="#">
            <span class="nav-icon">💬</span>
            <span>Messages</span>
        </a>

        <a class="nav-item" href="profile.html">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>

        <button
            class="post-btn"
            onclick="document.getElementById('postInput').focus()"
        >
            + Post
        </button>

        <a class="nav-user" href="profile.html">

            <div class="nav-avatar" id="navAvatar">?</div>

            <div class="nav-user-info">

                <div class="nav-user-name" id="navName">
                    Loading...
                </div>

                <div class="nav-user-handle">
                    View Profile
                </div>

            </div>

        </a>

    </aside>

    <main class="feed-col">

        <div class="feed-header">

            <div class="feed-tabs">

                <div class="feed-tab active">
                    For You
                </div>

                <div class="feed-tab">
                    Following
                </div>

            </div>

        </div>

        <div class="create-post">

            <div class="create-avatar" id="createAvatar">
                ?
            </div>

            <div class="create-right">

                <textarea
                    id="postInput"
                    placeholder="Share your startup idea..."
                ></textarea>

                <div class="create-actions">

                    <input
                        type="file"
                        id="mediaInput"
                        accept="image/*,video/*"
                    >

                    <button id="postBtn">
                        Post
                    </button>

                </div>

            </div>

        </div>

        <div id="feed"></div>

    </main>

    <aside class="rightbar">

        <div class="search-wrap">

            <input
                type="text"
                id="searchInput"
                placeholder="🔍 Search founders..."
            >

            <div id="searchResults"></div>

        </div>

        <div class="trending-box">

            <h3>Trending</h3>

            <div class="trend-item">
                <div class="trend-tag">#AI</div>
                <div class="trend-count">2.4k posts</div>
            </div>

            <div class="trend-item">
                <div class="trend-tag">#Startups</div>
                <div class="trend-count">1.8k posts</div>
            </div>

            <div class="trend-item">
                <div class="trend-tag">#BuildInPublic</div>
                <div class="trend-count">1.1k posts</div>
            </div>

            <div class="trend-item">
                <div class="trend-tag">#SaaS</div>
                <div class="trend-count">980 posts</div>
            </div>

            <div class="trend-item">
                <div class="trend-tag">#CoFounder</div>
                <div class="trend-count">740 posts</div>
            </div>

        </div>

    </aside>

</div>

<script type="module" src="home.js"></script>

</body>
</html>
