<!DOCTYPE html>
<html>
<head>
<title>Explore – NexFounder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }

:root{
  --bg-base:#07090f;
  --bg-surface:#0c0f1a;
  --bg-card:#0f1320;
  --bg-hover:#131827;
  --border:#1a2035;
  --border-mid:#222840;
  --accent:#3b6ef8;
  --accent-hover:#5585ff;
  --accent-glow:rgba(59,110,248,0.15);
  --cyan:#22d3ee;
  --text-primary:#e8ecf4;
  --text-secondary:#5a6580;
  --text-muted:#2d3550;
  --radius-sm:10px;
  --radius-md:14px;
  --radius-lg:20px;
  --radius-full:999px;
}

::-webkit-scrollbar{ width:5px; }
::-webkit-scrollbar-track{ background:transparent; }
::-webkit-scrollbar-thumb{ background:var(--border-mid); border-radius:var(--radius-full); }
*{ scrollbar-width:thin; scrollbar-color:var(--border-mid) transparent; }

body{
  background:var(--bg-base);
  color:var(--text-primary);
  font-family:'DM Sans', system-ui, sans-serif;
}

.layout{ display:flex; min-height:100vh; max-width:1200px; margin:auto; }

/* ── SIDEBAR ── */
.sidebar{
  width:260px; padding:20px 14px;
  border-right:1px solid var(--border);
  position:sticky; top:0; height:100vh;
  display:flex; flex-direction:column; gap:4px;
  background:var(--bg-base);
}
.logo{
  font-size:22px; font-weight:800;
  padding:8px 14px 16px;
  letter-spacing:-0.5px;
  background:linear-gradient(90deg, var(--cyan), var(--accent));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.nav-item{
  display:flex; align-items:center; gap:13px;
  padding:11px 14px; border-radius:var(--radius-md);
  text-decoration:none; color:var(--text-secondary);
  font-size:15px; font-weight:500;
  transition:background 0.18s, color 0.18s;
  position:relative;
}
.nav-item:hover{ background:var(--bg-hover); color:var(--text-primary); }
.nav-item.active{ color:var(--text-primary); background:var(--bg-hover); }
.nav-item.active::before{
  content:''; position:absolute;
  left:0; top:20%; bottom:20%;
  width:3px; border-radius:0 3px 3px 0;
  background:var(--accent);
}
.nav-icon{ width:22px; text-align:center; font-size:16px; filter:grayscale(1) brightness(2.5); flex-shrink:0; }
.nav-badge{
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  background:#e03366; color:white; font-size:10px; font-weight:700;
  border-radius:var(--radius-full); padding:2px 6px; min-width:18px; text-align:center; display:none;
}
.nav-badge.show{ display:block; }
.nav-user{
  display:flex; align-items:center; gap:11px;
  padding:11px 14px; border-radius:var(--radius-md);
  margin-top:auto; text-decoration:none; color:var(--text-primary);
  transition:background 0.18s;
  border:1px solid var(--border);
}
.nav-user:hover{ background:var(--bg-hover); }
.nav-avatar{
  width:38px; height:38px; border-radius:50%;
  background:linear-gradient(135deg, var(--accent), var(--cyan));
  color:white; display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:14px; overflow:hidden; flex-shrink:0;
}
.nav-avatar img{ width:100%; height:100%; object-fit:cover; border-radius:50%; }
.nav-user-name{ font-weight:600; font-size:13px; }
.nav-user-handle{ font-size:11px; color:var(--text-secondary); margin-top:1px; }

/* ── MAIN ── */
.main{ flex:1; border-right:1px solid var(--border); background:var(--bg-base); }

.page-header{
  padding:18px 22px;
  border-bottom:1px solid var(--border);
  font-size:18px; font-weight:800; letter-spacing:-0.3px;
  position:sticky; top:0;
  background:rgba(7,9,15,0.9);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  z-index:20;
  display:flex; align-items:center; gap:10px;
}
.page-header-icon{ font-size:20px; filter:grayscale(1) brightness(2.5); }

/* ── SEARCH BAR ── */
.search-bar{ padding:16px 20px; border-bottom:1px solid var(--border); background:var(--bg-surface); }
.search-bar input{
  width:100%; padding:12px 18px;
  border-radius:var(--radius-full);
  border:1px solid var(--border);
  background:var(--bg-card);
  color:var(--text-primary);
  outline:none; font-size:14px;
  font-family:'DM Sans', sans-serif;
  transition:border-color 0.18s, box-shadow 0.18s;
}
.search-bar input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}
.search-bar input::placeholder{ color:var(--text-muted); }

/* ── SECTION TITLE ── */
.section-title{
  padding:20px 22px 12px;
  font-size:12px; font-weight:700;
  color:var(--text-secondary);
  text-transform:uppercase; letter-spacing:0.8px;
}

/* ── PEOPLE GRID ── */
.people-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:0 20px 24px;
}

.person-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:22px 18px 18px;
  display:flex; flex-direction:column;
  align-items:center; text-align:center; gap:9px;
  transition:border-color 0.2s, transform 0.2s, background 0.2s;
  position:relative; overflow:hidden;
}
.person-card::before{
  content:'';
  position:absolute; top:0; left:0; right:0;
  height:3px;
  background:linear-gradient(90deg, var(--accent), var(--cyan));
  opacity:0; transition:opacity 0.22s;
}
.person-card:hover{
  border-color:var(--border-mid);
  background:var(--bg-hover);
  transform:translateY(-2px);
}
.person-card:hover::before{ opacity:1; }

.person-avatar{
  width:62px; height:62px; border-radius:50%;
  background:linear-gradient(135deg, var(--accent), var(--cyan));
  display:flex; align-items:center; justify-content:center;
  font-size:20px; font-weight:700; overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,0.35);
}
.person-avatar img{ width:100%; height:100%; object-fit:cover; border-radius:50%; }

.person-name{ font-weight:700; font-size:14px; letter-spacing:-0.2px; }
.person-username{ color:var(--text-secondary); font-size:12px; font-family:'DM Mono', monospace; }
.person-bio{ color:#8a96b0; font-size:12px; line-height:1.55; }

.connect-btn{
  padding:9px 20px; border:none;
  border-radius:var(--radius-full);
  font-weight:700; cursor:pointer; font-size:13px;
  font-family:'DM Sans', sans-serif;
  transition:background 0.18s, transform 0.1s;
  width:100%; margin-top:2px;
}
.connect-btn:active{ transform:scale(0.97); }
.connect-btn.default{ background:var(--accent); color:white; box-shadow:0 4px 14px var(--accent-glow); }
.connect-btn.default:hover{ background:var(--accent-hover); }
.connect-btn.pending{ background:transparent; border:1px solid var(--border-mid); color:var(--text-secondary); cursor:default; }
.connect-btn.connected{ background:transparent; border:1px solid var(--cyan); color:var(--cyan); }

.view-profile-btn{
  color:var(--text-secondary); font-size:12px; text-decoration:none;
  font-weight:500; transition:color 0.18s;
}
.view-profile-btn:hover{ color:var(--cyan); }

/* ── TRENDING POSTS ── */
.trending-post{
  padding:18px 22px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:background 0.15s;
}
.trending-post:hover{ background:var(--bg-card); }

.tp-meta{
  color:var(--text-secondary); font-size:12px;
  margin-bottom:7px; display:flex; align-items:center; gap:6px;
}
.tp-meta-dot{ width:3px; height:3px; border-radius:50%; background:var(--border-mid); }

.tp-text{ color:#c8d0e0; font-size:15px; line-height:1.65; }

.tp-stats{
  display:flex; gap:14px;
  margin-top:11px;
  color:var(--text-secondary); font-size:12px;
}
.tp-stat{ display:flex; align-items:center; gap:5px; }
.tp-stat-icon{ font-size:13px; filter:grayscale(1) brightness(2); }

/* ── EMPTY STATE ── */
.empty-state{
  padding:60px 20px;
  text-align:center;
  color:var(--text-secondary);
  font-size:14px;
}
.empty-state div:first-child{
  font-size:38px; margin-bottom:12px;
  filter:grayscale(1) brightness(1.5);
}

/* ── MOBILE ── */
@media(max-width:900px){
  .sidebar{ width:70px; padding:10px 8px; }
  .nav-item span:not(.nav-icon){ display:none; }
  .nav-item.active::before{ display:none; }
  .nav-user-info{ display:none; }
  .logo{ font-size:16px; padding:8px; }
  .people-grid{ grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">NexFounder</div>
    <a class="nav-item" href="home.html"><span class="nav-icon">🏠</span><span>Home</span></a>
    <a class="nav-item active" href="explore.html"><span class="nav-icon">🔍</span><span>Explore</span></a>
    <a class="nav-item" href="notifications.html">
      <span class="nav-icon">🔔</span><span>Notifications</span>
      <span class="nav-badge" id="notifBadge"></span>
    </a>
    <a class="nav-item" href="messages.html">
      <span class="nav-icon">💬</span><span>Messages</span>
      <span class="nav-badge" id="msgBadge"></span>
    </a>
    <a class="nav-item" href="profile.html"><span class="nav-icon">👤</span><span>Profile</span></a>
    <a class="nav-user" href="profile.html">
      <div class="nav-avatar" id="navAvatar">?</div>
      <div class="nav-user-info">
        <div class="nav-user-name" id="navName">Loading...</div>
        <div class="nav-user-handle">View Profile</div>
      </div>
    </a>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="page-header">
      <span class="page-header-icon">🔍</span> Explore
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search founders, topics...">
    </div>

    <div id="peopleSection">
      <div class="section-title">People you may know</div>
      <div class="people-grid" id="peopleGrid">
        <div class="empty-state"><div>👥</div>Loading founders...</div>
      </div>
    </div>

    <div id="postsSection">
      <div class="section-title">Trending Posts</div>
      <div id="trendingPosts"></div>
    </div>
  </main>

</div>
<script type="module" src="explore.js"></script>
</body>
</html>
