<!DOCTYPE html>
<html>
<head>
<title>Explore – NexFounder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:#0f172a; color:white; font-family:system-ui, Arial; }
.layout{ display:flex; min-height:100vh; max-width:1200px; margin:auto; }

/* SIDEBAR */
.sidebar{ width:260px; padding:20px; border-right:1px solid #1e293b; position:sticky; top:0; height:100vh; display:flex; flex-direction:column; gap:6px; }
.logo{ font-size:28px; font-weight:700; color:#22d3ee; padding:10px 14px; margin-bottom:10px; }
.nav-item{ display:flex; align-items:center; gap:14px; padding:13px 14px; border-radius:14px; text-decoration:none; color:white; font-size:17px; transition:0.2s; position:relative; }
.nav-item:hover{ background:#1e293b; }
.nav-item.active{ color:#22d3ee; font-weight:700; }
.nav-icon{ width:24px; text-align:center; }
.nav-badge{ position:absolute; right:14px; top:50%; transform:translateY(-50%); background:#f43f5e; color:white; font-size:11px; font-weight:700; border-radius:10px; padding:2px 7px; min-width:20px; text-align:center; display:none; }
.nav-badge.show{ display:block; }
.nav-user{ display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:14px; margin-top:auto; text-decoration:none; color:white; transition:0.2s; }
.nav-user:hover{ background:#1e293b; }
.nav-avatar{ width:42px; height:42px; border-radius:50%; background:#22d3ee; color:#0f172a; display:flex; align-items:center; justify-content:center; font-weight:700; overflow:hidden; }
.nav-user-name{ font-weight:600; font-size:14px; }
.nav-user-handle{ font-size:12px; color:#64748b; }

/* MAIN */
.main{ flex:1; border-right:1px solid #1e293b; }
.page-header{ padding:20px; border-bottom:1px solid #1e293b; font-size:20px; font-weight:700; position:sticky; top:0; background:rgba(15,23,42,0.92); backdrop-filter:blur(10px); z-index:20; }

.search-bar{ padding:16px 20px; border-bottom:1px solid #1e293b; }
.search-bar input{ width:100%; padding:13px 18px; border-radius:30px; border:1px solid #1e293b; background:#111827; color:white; outline:none; font-size:15px; }
.search-bar input:focus{ border-color:#22d3ee; }

.section-title{ padding:18px 20px 10px; font-size:17px; font-weight:700; color:#94a3b8; }

/* PEOPLE CARDS */
.people-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:0 20px 20px; }
.person-card{ background:#111827; border:1px solid #1e293b; border-radius:20px; padding:20px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:10px; transition:0.2s; }
.person-card:hover{ border-color:#334155; background:#1a2234; }
.person-avatar{ width:64px; height:64px; border-radius:50%; background:#2563eb; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; overflow:hidden; }
.person-avatar img{ width:100%; height:100%; object-fit:cover; border-radius:50%; }
.person-name{ font-weight:700; font-size:15px; }
.person-username{ color:#64748b; font-size:13px; }
.person-bio{ color:#94a3b8; font-size:13px; line-height:1.5; }
.connect-btn{ padding:9px 20px; border:none; border-radius:20px; font-weight:700; cursor:pointer; font-size:14px; transition:0.2s; width:100%; }
.connect-btn.default{ background:#22d3ee; color:#0f172a; }
.connect-btn.default:hover{ background:#06b6d4; }
.connect-btn.pending{ background:transparent; border:1px solid #334155; color:#64748b; cursor:default; }
.connect-btn.connected{ background:#1e293b; color:#22d3ee; border:1px solid #22d3ee; }
.view-profile-btn{ color:#64748b; font-size:13px; text-decoration:none; }
.view-profile-btn:hover{ color:#22d3ee; }

/* TRENDING POSTS */
.trending-post{ padding:18px 20px; border-bottom:1px solid #1e293b; cursor:pointer; transition:0.15s; }
.trending-post:hover{ background:#111827; }
.tp-meta{ color:#64748b; font-size:13px; margin-bottom:6px; }
.tp-text{ color:#e2e8f0; font-size:15px; line-height:1.6; }
.tp-stats{ display:flex; gap:16px; margin-top:10px; color:#64748b; font-size:13px; }

/* NO RESULTS */
.empty-state{ padding:60px 20px; text-align:center; color:#64748b; }
.empty-state div{ font-size:40px; margin-bottom:12px; }

@media(max-width:900px){
  .sidebar{ width:76px; padding:10px; }
  .nav-item span:not(.nav-icon){ display:none; }
  .nav-user-info{ display:none; }
  .logo{ font-size:20px; padding:10px; }
  .people-grid{ grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">NexFounder</div>
    <a class="nav-item" href="home.html"><span class="nav-icon">🏠</span><span>Home</span></a>
    <a class="nav-item active" href="explore.html"><span class="nav-icon">🔍</span><span>Explore</span></a>
    <a class="nav-item" href="notifications.html">
      <span class="nav-icon">🔔</span><span>Notifications</span>
      <span class="nav-badge" id="notifBadge"></span>
    </a>
    <a class="nav-item" href="messages.html">
      <span class="nav-icon">💬</span><span>Messages</span>
      <span class="nav-badge" id="msgBadge"></span>
    </a>
    <a class="nav-item" href="profile.html"><span class="nav-icon">👤</span><span>Profile</span></a>
    <a class="nav-user" href="profile.html">
      <div class="nav-avatar" id="navAvatar">?</div>
      <div class="nav-user-info">
        <div class="nav-user-name" id="navName">Loading...</div>
        <div class="nav-user-handle">View Profile</div>
      </div>
    </a>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="page-header">🔍 Explore</div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search founders, topics...">
    </div>

    <div id="peopleSection">
      <div class="section-title">People you may know</div>
      <div class="people-grid" id="peopleGrid">
        <div class="empty-state"><div>👥</div>Loading founders...</div>
      </div>
    </div>

    <div id="postsSection">
      <div class="section-title">Trending Posts</div>
      <div id="trendingPosts"></div>
    </div>
  </main>

</div>
<script type="module" src="explore.js"></script>
</body>
</html>
