<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications – NexFounder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cyan:   #22d3ee;
  --cyan-d: #06b6d4;
  --blue:   #2563eb;
  --red:    #f43f5e;
  --green:  #10b981;
  --amber:  #f59e0b;
  --bg:     #020817;
  --bg2:    #0b1220;
  --bg3:    #0f172a;
  --card:   #0d1b2e;
  --border: #1e293b;
  --border2:#2a3a54;
  --text:   #f1f5f9;
  --muted:  #64748b;
  --muted2: #94a3b8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:10px; }

.layout { display:flex; min-height:100vh; max-width:1300px; margin:auto; }

/* ── SIDEBAR (shared style) ── */
.sidebar {
  width:280px; padding:24px 20px;
  border-right:1px solid var(--border);
  position:sticky; top:0; height:100vh;
  display:flex; flex-direction:column; gap:4px;
  overflow-y:auto;
}
.logo {
  font-family:'Syne',sans-serif;
  font-size:26px; font-weight:800;
  background:linear-gradient(135deg,#fff 0%,var(--cyan) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  padding:8px 12px; margin-bottom:16px; display:block;
}
.nav-item {
  display:flex; align-items:center; gap:14px;
  padding:13px 14px; border-radius:16px;
  text-decoration:none; color:var(--muted2);
  font-size:16px; font-weight:500; transition:all 0.2s; position:relative;
}
.nav-item:hover { background:rgba(255,255,255,0.04); color:var(--text); }
.nav-item.active { color:var(--cyan); font-weight:700; background:rgba(34,211,238,0.07); }
.nav-icon { width:22px; text-align:center; font-size:18px; }
.nav-badge {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  background:var(--red); color:white; font-size:11px; font-weight:800;
  border-radius:10px; padding:2px 7px; min-width:20px; text-align:center;
  display:none;
}
.nav-badge.show { display:block; }
.nav-user {
  display:flex; align-items:center; gap:12px;
  padding:12px 14px; border-radius:16px;
  margin-top:auto; text-decoration:none; color:var(--text);
  transition:0.2s; border:1px solid transparent;
}
.nav-user:hover { background:rgba(255,255,255,0.04); border-color:var(--border); }
.nav-avatar {
  width:42px; height:42px; border-radius:50%;
  background:linear-gradient(135deg,var(--cyan),var(--blue));
  color:white; display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:15px; overflow:hidden; flex-shrink:0;
}
.nav-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.nav-user-name { font-weight:700; font-size:14px; }
.nav-user-handle { font-size:12px; color:var(--muted); }

/* ── MAIN ── */
.main { flex:1; min-height:100vh; }

.page-header {
  padding:20px 28px;
  border-bottom:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center;
  position:sticky; top:0;
  background:rgba(2,8,23,0.88); backdrop-filter:blur(16px);
  z-index:20;
}
.page-header-left { display:flex; align-items:center; gap:12px; }
.page-title {
  font-family:'Syne',sans-serif;
  font-size:22px; font-weight:800;
}
.unread-chip {
  background:rgba(34,211,238,0.1); border:1px solid rgba(34,211,238,0.2);
  color:var(--cyan); font-size:12px; font-weight:700;
  padding:3px 10px; border-radius:20px;
}

/* Filter tabs */
.filter-row {
  display:flex; gap:0;
  border-bottom:1px solid var(--border);
  padding:0 28px;
  background:rgba(2,8,23,0.7);
  position:sticky; top:65px; z-index:10;
}
.filter-tab {
  padding:14px 20px; color:var(--muted); font-size:14px;
  font-weight:600; cursor:pointer; border-bottom:2px solid transparent;
  transition:0.2s; white-space:nowrap;
}
.filter-tab:hover { color:var(--muted2); }
.filter-tab.active { color:var(--text); border-bottom:2px solid var(--cyan); }

.mark-all-btn {
  padding:8px 18px; border:1px solid var(--border);
  border-radius:20px; background:transparent; color:var(--muted);
  cursor:pointer; font-size:13px; font-family:'DM Sans',sans-serif;
  transition:0.2s;
}
.mark-all-btn:hover { color:var(--text); border-color:var(--border2); }

/* ── NOTIFICATION ITEMS ── */
.notif-item {
  padding:18px 28px;
  border-bottom:1px solid var(--border);
  display:flex; gap:14px; align-items:flex-start;
  cursor:pointer; transition:background 0.15s;
  animation:fadeIn 0.3s ease both;
}
.notif-item:hover { background:rgba(255,255,255,0.02); }
.notif-item.unread {
  background:rgba(34,211,238,0.03);
  border-left:3px solid var(--cyan);
}
.notif-item.unread:hover { background:rgba(34,211,238,0.05); }

@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* Icon badge */
.notif-icon-wrap { position:relative; flex-shrink:0; }
.notif-avatar {
  width:46px; height:46px; border-radius:50%;
  background:linear-gradient(135deg,var(--blue),#7c3aed);
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:16px; overflow:hidden;
}
.notif-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.notif-type-icon {
  position:absolute; bottom:-2px; right:-2px;
  width:20px; height:20px; border-radius:50%;
  background:var(--bg3); border:2px solid var(--bg);
  display:flex; align-items:center; justify-content:center;
  font-size:11px;
}

.notif-body { flex:1; }
.notif-text { color:#e2e8f0; font-size:15px; line-height:1.5; }
.notif-text b { color:white; font-weight:700; }
.notif-subtext { color:var(--muted); font-size:13px; margin-top:4px; }
.notif-time { color:var(--muted); font-size:12px; margin-top:5px; display:flex; align-items:center; gap:5px; }

/* Unread dot */
.unread-dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--cyan); flex-shrink:0; margin-top:6px;
}

/* Accept/Decline buttons */
.accept-row { display:flex; gap:10px; margin-top:12px; }
.accept-btn {
  padding:9px 20px; border:none; border-radius:20px;
  background:var(--cyan); color:var(--bg);
  font-weight:700; cursor:pointer; font-size:13px;
  font-family:'DM Sans',sans-serif;
  transition:0.2s;
}
.accept-btn:hover { background:var(--cyan-d); }
.decline-btn {
  padding:9px 20px; border:1px solid var(--border);
  border-radius:20px; background:transparent; color:var(--muted2);
  cursor:pointer; font-size:13px; font-family:'DM Sans',sans-serif;
  transition:0.2s;
}
.decline-btn:hover { border-color:var(--red); color:var(--red); }

/* Empty state */
.empty-state {
  padding:100px 20px; text-align:center; color:var(--muted);
  display:flex; flex-direction:column; align-items:center; gap:12px;
}
.empty-state-icon { font-size:52px; }
.empty-state-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; color:var(--muted2); }
.empty-state-sub { font-size:14px; max-width:300px; line-height:1.6; }

/* ── RESPONSIVE ── */
@media(max-width:760px){
  .sidebar{ width:72px; padding:16px 10px; }
  .nav-item span:not(.nav-icon){ display:none; }
  .nav-user-info{ display:none; }
  .logo{ font-size:0; padding:6px; }
  .logo::after{ content:'N'; font-size:22px; font-family:'Syne',sans-serif; font-weight:800; color:var(--cyan); }
  .notif-item { padding:16px 18px; }
  .filter-row { padding:0 16px; overflow-x:auto; }
}
</style>
</head>
<body>
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">NexFounder</div>
    <a class="nav-item" href="home.html"><span class="nav-icon">🏠</span><span>Home</span></a>
    <a class="nav-item" href="explore.html"><span class="nav-icon">🔍</span><span>Explore</span></a>
    <a class="nav-item active" href="notifications.html">
      <span class="nav-icon">🔔</span><span>Notifications</span>
      <span class="nav-badge" id="notifBadge"></span>
    </a>
    <a class="nav-item" href="messages.html">
      <span class="nav-icon">💬</span><span>Messages</span>
      <span class="nav-badge" id="msgBadge"></span>
    </a>
    <a class="nav-item" href="profile.html"><span class="nav-icon">👤</span><span>Profile</span></a>
    <a class="nav-user" href="profile.html">
      <div class="nav-avatar" id="navAvatar">?</div>
      <div class="nav-user-info">
        <div class="nav-user-name" id="navName">Loading...</div>
        <div class="nav-user-handle">View Profile</div>
      </div>
    </a>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="page-header">
      <div class="page-header-left">
        <div class="page-title">Notifications</div>
        <span class="unread-chip" id="unreadChip" style="display:none"></span>
      </div>
      <button class="mark-all-btn" id="markAllBtn">Mark all as read</button>
    </div>

    <div class="filter-row">
      <div class="filter-tab active" onclick="setFilter('all',this)">All</div>
      <div class="filter-tab" onclick="setFilter('connect',this)">Connections</div>
      <div class="filter-tab" onclick="setFilter('follow',this)">Followers</div>
      <div class="filter-tab" onclick="setFilter('like',this)">Likes</div>
    </div>

    <div id="notifList">
      <div class="empty-state">
        <div class="empty-state-icon">🔔</div>
        <div class="empty-state-title">Loading notifications...</div>
      </div>
    </div>
  </main>

</div>

<script>
function setFilter(type, el) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  // Filter logic handled in notifications.js
  window._notifFilter = type;
  if (window._renderNotifs) window._renderNotifs();
}
</script>
<script type="module" src="notifications.js"></script>
</body>
</html>
