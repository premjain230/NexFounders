<!doctype html>
<html>
<head>
<title>NexFounder Profile</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1220;
    color:white;
    font-family:system-ui, Arial;
}

/* ───────── NAVBAR ───────── */

.navbar{
    height:70px;
    background:rgba(15,23,42,0.92);
    backdrop-filter:blur(12px);

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 28px;

    border-bottom:1px solid #1e293b;

    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    font-size:24px;
    font-weight:800;
    color:#38bdf8;
}

.navlinks{
    display:flex;
    gap:20px;
}

.navlinks a{
    text-decoration:none;
    color:#94a3b8;
    font-weight:600;
    transition:0.2s;
}

.navlinks a:hover{
    color:#38bdf8;
}

/* ───────── CONTAINER ───────── */

.container{
    max-width:950px;
    margin:auto;
    padding:24px;
}

/* ───────── PROFILE CARD ───────── */

.profilecard{
    background:#0f172a;

    border:1px solid #1e293b;

    border-radius:28px;

    overflow:hidden;

    box-shadow:
    0 10px 40px rgba(0,0,0,0.35);
}

/* ───────── BANNER ───────── */

.banner{
    height:260px;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #06b6d4,
        #7c3aed
    );

    background-size:cover;
    background-position:center;

    position:relative;

    transition:0.25s;
}

.banner:hover{
    filter:brightness(1.05);
}

#bannerInput{
    display:none;
}

/* ───────── BANNER BUTTON ───────── */

.banner-edit-btn{
    position:absolute;

    right:20px;
    bottom:20px;

    border:none;

    padding:11px 18px;

    border-radius:14px;

    background:rgba(0,0,0,0.55);

    color:white;

    font-weight:700;

    backdrop-filter:blur(10px);

    cursor:pointer;

    transition:0.2s;
}

.banner-edit-btn:hover{
    background:rgba(0,0,0,0.75);
}

/* ───────── PROFILE PIC ───────── */

.profilepic{
    width:140px;
    height:140px;

    border-radius:50%;

    border:5px solid #0f172a;

    background:#111827;

    margin-top:-70px;
    margin-left:34px;

    position:relative;
    z-index:20;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:38px;
    font-weight:800;

    background-size:cover;
    background-position:center;

    box-shadow:
    0 10px 35px rgba(0,0,0,0.45);

    overflow:hidden;

    transition:0.25s;
}

.profilepic:hover{
    transform:scale(1.02);
}

#avatarInput{
    display:none;
}

/* ───────── AVATAR BUTTON ───────── */

.avatar-edit-btn{
    position:absolute;

    right:4px;
    bottom:4px;

    width:38px;
    height:38px;

    border:none;
    border-radius:50%;

    background:#38bdf8;
    color:#0b1220;

    font-size:16px;
    font-weight:800;

    cursor:pointer;

    box-shadow:
    0 6px 16px rgba(0,0,0,0.4);

    transition:0.2s;
}

.avatar-edit-btn:hover{
    transform:scale(1.08);
}

/* ───────── CONTENT ───────── */

.profilecontent{
    padding:22px 34px 34px;
}

.name{
    font-size:34px;
    font-weight:800;
}

.username{
    color:#94a3b8;
    margin-top:4px;
    font-size:16px;
}

.email{
    color:#64748b;
    font-size:14px;
    margin-top:6px;
}

/* ───────── BUTTONS ───────── */

.btn-row{
    display:flex;
    gap:12px;
    margin-top:18px;
}

.editbtn,
.followbtn{
    padding:12px 18px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    font-weight:700;

    transition:0.2s;
}

.editbtn{
    background:#2563eb;
    color:white;
}

.editbtn:hover{
    background:#3b82f6;
}

.followbtn{
    background:#38bdf8;
    color:#0b1220;
}

.followbtn:hover{
    opacity:0.9;
}

.followbtn.following{
    background:transparent;
    border:1px solid #334155;
    color:#94a3b8;
}

/* ───────── BIO ───────── */

.bio{
    margin-top:22px;

    color:#cbd5e1;

    line-height:1.7;

    font-size:15px;
}

/* ───────── STATS ───────── */

.stats{
    display:flex;
    gap:16px;
    margin-top:28px;
}

.statbox{
    background:#0b1220;

    border:1px solid #1e293b;

    padding:16px 24px;

    border-radius:18px;

    min-width:130px;
}

.statnumber{
    font-size:22px;
    font-weight:800;
}

.statlabel{
    color:#94a3b8;
    font-size:13px;
    margin-top:3px;
}

/* ───────── POSTS ───────── */

.postsection{
    margin-top:28px;
}

.empty{
    background:#0f172a;

    border:1px solid #1e293b;

    border-radius:20px;

    padding:50px;

    text-align:center;

    color:#64748b;
}

/* ───────── MODAL ───────── */

.modal-overlay{
    display:none;

    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.72);

    justify-content:center;
    align-items:center;

    z-index:500;
}

.modal-overlay.open{
    display:flex;
}

.modal{
    background:#0f172a;

    padding:28px;

    border-radius:22px;

    width:100%;
    max-width:480px;

    border:1px solid #1e293b;

    box-shadow:
    0 15px 45px rgba(0,0,0,0.45);
}

.field{
    margin-bottom:14px;
}

.field input,
.field textarea{
    width:100%;

    padding:13px 14px;

    border-radius:14px;

    border:1px solid #1e293b;

    background:#0b1220;

    color:white;

    outline:none;

    resize:none;

    font-family:inherit;
}

.field textarea{
    min-height:110px;
}

.modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:16px;
}

.savebtn{
    background:#38bdf8;

    color:#0b1220;

    border:none;

    padding:12px 18px;

    border-radius:12px;

    cursor:pointer;

    font-weight:700;
}

.cancelbtn{
    background:transparent;

    border:1px solid #1e293b;

    color:#94a3b8;

    padding:12px 18px;

    border-radius:12px;

    cursor:pointer;
}

/* ───────── MOBILE ───────── */

@media(max-width:700px){

    .container{
        padding:12px;
    }

    .banner{
        height:190px;
    }

    .profilepic{
        width:115px;
        height:115px;

        margin-top:-58px;
        margin-left:22px;

        font-size:30px;
    }

    .profilecontent{
        padding:18px 22px 26px;
    }

    .name{
        font-size:28px;
    }

    .stats{
        flex-wrap:wrap;
    }

}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <div class="logo">
        NexFounder
    </div>

    <div class="navlinks">

        <a href="home.html">
            Home
        </a>

        <a href="profile.html">
            Profile
        </a>

    </div>

</div>

<!-- CONTAINER -->

<div class="container">

    <div class="profilecard">

        <!-- BANNER -->

        <div
            class="banner"
            id="banner"
        >

            <button
                class="banner-edit-btn"
                type="button"
            >
                Change Banner
            </button>

        </div>

        <input
            type="file"
            id="bannerInput"
            accept="image/*"
        >

        <!-- PROFILE PIC -->

        <div
            class="profilepic"
            id="avatar"
        >

            <button
                class="avatar-edit-btn"
                type="button"
            >
                ✎
            </button>

        </div>

        <input
            type="file"
            id="avatarInput"
            accept="image/*"
        >

        <!-- CONTENT -->

        <div class="profilecontent">

            <div
                class="name"
                id="displayName"
            ></div>

            <div
                class="username"
                id="displayUsername"
            ></div>

            <div
                class="email"
                id="displayEmail"
            ></div>

            <div class="btn-row">

                <button
                    class="followbtn"
                    id="followBtn"
                >
                    Follow
                </button>

                <button
                    class="editbtn"
                    id="openEditBtn"
                >
                    Edit Profile
                </button>

            </div>

            <div
                class="bio"
                id="displayBio"
            ></div>

            <div class="stats">

                <div class="statbox">

                    <div
                        class="statnumber"
                        id="followersCount"
                    >
                        0
                    </div>

                    <div class="statlabel">
                        Followers
                    </div>

                </div>

                <div class="statbox">

                    <div
                        class="statnumber"
                        id="followingCount"
                    >
                        0
                    </div>

                    <div class="statlabel">
                        Following
                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- POSTS -->

    <div
        class="postsection"
        id="userPosts"
    >

        <div class="empty">
            Loading posts...
        </div>

    </div>

</div>

<!-- MODAL -->

<div
    class="modal-overlay"
    id="editModal"
>

    <div class="modal">

        <div class="field">

            <input
                id="inputName"
                placeholder="Name"
            >

        </div>

        <div class="field">

            <input
                id="inputUsername"
                placeholder="Username"
            >

        </div>

        <div class="field">

            <textarea
                id="inputBio"
                placeholder="Bio"
            ></textarea>

        </div>

        <div class="modal-actions">

            <button
                class="cancelbtn"
                id="cancelBtn"
            >
                Cancel
            </button>

            <button
                class="savebtn"
                id="saveBtn"
            >
                Save
            </button>

        </div>

    </div>

</div>

<script
    type="module"
    src="profile.js"
></script>

</body>
</html>
