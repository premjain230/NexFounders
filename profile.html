<!DOCTYPE html>
<html>
<head>
<title>NexFounder Profile</title>

<style>
body{
    margin:0;
    font-family: system-ui, -apple-system, Arial;
    background:#0b1220;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Card */
.profile{
    width:360px;
    background:#0f172a;
    border:1px solid #1f2937;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    position:relative;
}

/* Banner */
.banner{
    height:120px;
    background:linear-gradient(135deg, #1d4ed8, #06b6d4);
}

/* Profile pic */
.profilepic{
    width:92px;
    height:92px;
    border-radius:50%;
    background:#22d3ee;
    border:4px solid #0f172a;

    position:absolute;
    top:75px;
    left:20px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-weight:700;
    font-size:22px;
    color:#0f172a;
}

/* Info section */
.profileinfo{
    padding:55px 18px 18px;
}

.name{
    font-size:20px;
    font-weight:700;
    margin:0;
}

.username{
    color:#94a3b8;
    margin:4px 0 10px;
}

/* stats */
.stats{
    display:flex;
    gap:15px;
    font-size:14px;
    color:#cbd5e1;
    margin:10px 0;
}

.stats span{
    font-weight:600;
    color:white;
}

/* button */
button{
    margin-top:12px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#1d4ed8;
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#2563eb;
    transform:scale(1.02);
}
</style>
</head>

<body>

<div class="profile">

    <div class="banner"></div>

    <div class="profilepic">PJ</div>

    <div class="profileinfo">
        <h2 class="name"></h2>
        <div class="username"></div>

        <div class="stats">
            <div><span>0</span> Following</div>
            <div><span>0</span> Followers</div>
        </div>

        <button>Edit Profile</button>
    </div>

</div>
    
<script type="module" src="profile.js"></script>
</body>
</html>
