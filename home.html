<!DOCTYPE html>
<html>
<head>
<title>NexFounder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background:#0f172a;
    color:white;
    font-family:system-ui, Arial;
}

/* ── Layout ── */
.layout {
    display:flex;
    min-height:100vh;
    max-width:1200px;
    margin:auto;
}

/* ── Left Sidebar ── */
.sidebar {
    width:260px;
    padding:20px;
    border-right:1px solid #1e293b;
    position:sticky;
    top:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    gap:6px;
}

.logo {
    font-size:26px;
    font-weight:700;
    color:#22d3ee;
    padding:10px 14px;
    margin-bottom:10px;
}

.nav-item {
    display:flex;
    align-items:center;
    gap:14px;
    padding:12px 14px;
    border-radius:14px;
    text-decoration:none;
    color:white;
    font-size:17px;
    transition:0.2s;
    cursor:pointer;
    border:none;
    background:none;
    width:100%;
    text-align:left;
}

.nav-item:hover { background:#1e293b; }
.nav-item.active { font-weight:700; color:#22d3ee; }

.nav-icon { font-size:20px; width:24px; text-align:center; }

.post-btn {
    margin-top:auto;
    padding:14px;
    border:none;
    border-radius:30px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
}

.post-btn:hover { background:#3b82f6; }

.nav-user {
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 14px;
    border-radius:14px;
    margin-top:10px;
    cursor:pointer;
    transition:0.2s;
    text-decoration:none;
    color:white;
}

.nav-user:hover { background:#1e293b; }

.nav-avatar {
    width:40px;
    height:40px;
    border-radius:50%;
    background:#22d3ee;
    color:#0f172a;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    font-size:15px;
    flex-shrink:0;
}

.nav-user-info { overflow:hidden; }
.nav-user-name { font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.nav-user-handle { font-size:12px; color:#64748b; }

/* ── Center Feed ── */
.feed-col {
    flex:1;
    border-right:1px solid #1e293b;
    min-height:100vh;
}

.feed-header {
    position:sticky;
    top:0;
    background:rgba(15,23,42,0.9);
    backdrop-filter:blur(10px);
    border-bottom:1px solid #1e293b;
    z-index:10;
}

.feed-tabs {
    display:flex;
}

.feed-tab {
    flex:1;
    padding:18px;
    text-align:center;
    font-weight:600;
    color:#64748b;
    cursor:pointer;
    border-bottom:2px solid transparent;
    transition:0.2s;
    font-size:15px;
}

.feed-tab.active {
    color:white;
    border-bottom:2px solid #2563eb;
}

/* ── Create Post ── */
.create-post {
    padding:16px 20px;
    border-bottom:1px solid #1e293b;
    display:flex;
    gap:12px;
}

.create-avatar {
    width:44px;
    height:44px;
    border-radius:50%;
    background:#22d3ee;
    color:#0f172a;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    font-size:16px;
    flex-shrink:0;
}

.create-right { flex:1; }

.create-right textarea {
    width:100%;
    background:transparent;
    border:none;
    outline:none;
    color:white;
    font-size:17px;
    resize:none;
    font-family:inherit;
    min-height:60px;
    padding-top:8px;
}

.create-right textarea::placeholder { color:#475569; }

.create-actions {
    display:flex;
    justify-content:flex-end;
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid #1e293b;
}

.create-actions button {
    padding:10px 22px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:25px;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    transition:0.2s;
}

.create-actions button:hover { background:#3b82f6; }
.create-actions button:disabled { opacity:0.5; cursor:not-allowed; }

/* ── Posts ── */
#feed { }

.post {
    padding:16px 20px;
    border-bottom:1px solid #1e293b;
    transition:background 0.15s;
}

.post:hover { background:#111827; }

.post-header {
    display:flex;
    gap:12px;
    align-items:flex-start;
    margin-bottom:10px;
}

.post-avatar {
    width:44px;
    height:44px;
    border-radius:50%;
    background:#2563eb;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    font-size:15px;
    flex-shrink:0;
}

.post-name { font-weight:700; font-size:15px; }

.profile-link {
    color:white;
    text-decoration:none;
}

.profile-link:hover { text-decoration:underline; color:#22d3ee; }

.post-username { font-size:13px; color:#64748b; margin-top:2px; }
.post-time { color:#475569; }
.post-text { font-size:16px; line-height:1.6; color:#e2e8f0; margin-left:56px; }

.post-actions {
    display:flex;
    gap:24px;
    margin-top:12px;
    margin-left:56px;
}

.like-btn {
    background:none;
    border:none;
    color:#64748b;
    cursor:pointer;
    font-size:14px;
    display:flex;
    align-items:center;
    gap:6px;
    padding:6px 10px;
    border-radius:20px;
    transition:0.2s;
}

.like-btn:hover { background:#1e293b; color:#f43f5e; }
.like-btn.liked { color:#f43f5e; }

/* ── Right Panel ── */
.rightbar {
    width:320px;
    padding:20px;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
}

.search-wrap {
    position:relative;
    margin-bottom:20px;
}

.search-wrap input {
    width:100%;
    padding:12px 18px;
    border:1px solid #1e293b;
    border-radius:30px;
    background:#111827;
    color:white;
    font-size:14px;
    outline:none;
    transition:border-color 0.2s;
}

.search-wrap input:focus { border-color:#2563eb; }

#searchResults {
    display:none;
    position:absolute;
    top:calc(100% + 6px);
    left:0;
    right:0;
    background:#111827;
    border:1px solid #1e293b;
    border-radius:16px;
    overflow:hidden;
    z-index:50;
}

.search-result {
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 16px;
    cursor:pointer;
    transition:0.15s;
}

.search-result:hover { background:#1e293b; }

.search-avatar {
    width:38px;
    height:38px;
    border-radius:50%;
    background:#2563eb;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    font-size:13px;
    flex-shrink:0;
}

.trending-box {
    background:#111827;
    border:1px solid #1e293b;
    border-radius:20px;
    padding:18px;
}

.trending-box h3 {
    font-size:18px;
    font-weight:700;
    margin-bottom:16px;
}

.trend-item {
    padding:10px 0;
    border-bottom:1px solid #1e293b;
    cursor:pointer;
    transition:0.15s;
}

.trend-item:last-child { border-bottom:none; }
.trend-item:hover { color:#22d3ee; }
.trend-tag { font-weight:700; font-size:15px; }
.trend-count { font-size:12px; color:#64748b; margin-top:2px; }

@media(max-width:900px) {
    .rightbar { display:none; }
    .sidebar { width:70px; padding:10px; }
    .nav-item span:not(.nav-icon) { display:none; }
    .logo { font-size:20px; padding:10px; }
    .post-btn { padding:12px; font-size:13px; }
    .nav-user-info { display:none; }
}

</style>
</head>
<body>

<div class="layout">

    <!-- ── LEFT SIDEBAR ── -->
    <aside class="sidebar">
        <div class="logo">NexFounder</div>

        <a class="nav-item active" href="home.html">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a class="nav-item" href="#">
            <span class="nav-icon">🔍</span>
            <span>Explore</span>
        </a>
        <a class="nav-item" href="#">
            <span class="nav-icon">🔔</span>
            <span>Notifications</span>
        </a>
        <a class="nav-item" href="#">
            <span class="nav-icon">💬</span>
            <span>Messages</span>
        </a>
        <a class="nav-item" href="profile.html">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>

        <button class="post-btn" onclick="document.getElementById('postInput').focus()">+ Post</button>

        <a class="nav-user" href="profile.html" id="navUserLink">
            <div class="nav-avatar" id="navAvatar">?</div>
            <div class="nav-user-info">
                <div class="nav-user-name" id="navName">Loading...</div>
                <div class="nav-user-handle">View Profile</div>
            </div>
        </a>
    </aside>

    <!-- ── CENTER FEED ── -->
    <main class="feed-col">

        <div class="feed-header">
            <div class="feed-tabs">
                <div class="feed-tab active">For You</div>
                <div class="feed-tab">Following</div>
            </div>
        </div>

        <!-- Create Post -->
        <div class="create-post">
            <div class="create-avatar" id="createAvatar">?</div>
            <div class="create-right">
                <textarea id="postInput" placeholder="Share your startup idea..." rows="2"></textarea>
                <div class="create-actions">
                    <button id="postBtn">Post</button>
                </div>
            </div>
        </div>

        <!-- Feed -->
        <div id="feed"></div>

    </main>

    <!-- ── RIGHT PANEL ── -->
    <aside class="rightbar">

        <div class="search-wrap">
            <input type="text" id="searchInput" placeholder="🔍  Search founders..." />
            <div id="searchResults"></div>
        </div>

        <div class="trending-box">
            <h3>Trending</h3>
            <div class="trend-item">
                <div class="trend-tag">#AI</div>
                <div class="trend-count">2.4k posts</div>
            </div>
            <div class="trend-item">
                <div class="trend-tag">#Startups</div>
                <div class="trend-count">1.8k posts</div>
            </div>
            <div class="trend-item">
                <div class="trend-tag">#BuildInPublic</div>
                <div class="trend-count">1.1k posts</div>
            </div>
            <div class="trend-item">
                <div class="trend-tag">#SaaS</div>
                <div class="trend-count">980 posts</div>
            </div>
            <div class="trend-item">
                <div class="trend-tag">#CoFounder</div>
                <div class="trend-count">740 posts</div>
            </div>
        </div>

    </aside>

</div>

<script type="module" src="home.js"></script>

</body>
</html>
