<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Messages — NexFounder</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,system-ui,sans-serif;
}

body{
  background:#000;
  color:white;
}

/* APP */
.layout{
  max-width:700px;
  margin:auto;
  min-height:100vh;
  border-left:1px solid #1e293b;
  border-right:1px solid #1e293b;
  background:#000;
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.9);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #1e293b;
  padding:16px;
  z-index:100;
}

.header-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:14px;
}

.header h1{
  font-size:24px;
  font-weight:800;
}

.new-btn{
  border:none;
  background:#38bdf8;
  color:black;
  font-weight:800;
  padding:10px 16px;
  border-radius:999px;
  cursor:pointer;
}

/* SEARCH */
.search-box{
  width:100%;
  background:#0f172a;
  border:none;
  outline:none;
  color:white;
  padding:14px 16px;
  border-radius:999px;
  font-size:15px;
}

/* CONVERSATIONS */
.conv-list{
  display:flex;
  flex-direction:column;
}

.conv-item{
  display:flex;
  align-items:center;
  gap:14px;
  padding:16px;
  text-decoration:none;
  color:white;
  transition:0.2s;
  border-bottom:1px solid rgba(255,255,255,0.03);
}

.conv-item:hover{
  background:#0f172a;
}

.conv-avatar{
  width:56px;
  height:56px;
  border-radius:50%;
  background:#38bdf8;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  color:black;
  flex-shrink:0;
}

.conv-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.conv-content{
  flex:1;
  min-width:0;
}

.conv-name{
  font-weight:700;
  font-size:15px;
}

.conv-preview{
  color:#94a3b8;
  font-size:14px;
  margin-top:4px;

  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.conv-right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:8px;
}

.conv-time{
  font-size:12px;
  color:#64748b;
}

.unread-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#38bdf8;
}

/* EMPTY */
.empty{
  padding:60px 20px;
  text-align:center;
  color:#64748b;
}

.empty div{
  font-size:50px;
  margin-bottom:12px;
}

/* MODAL */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:200;
}

.modal-overlay.open{
  display:flex;
}

.modal{
  width:100%;
  max-width:420px;
  background:#020617;
  border:1px solid #1e293b;
  border-radius:20px;
  padding:20px;
}

.modal-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:14px;
}

.modal-close{
  background:none;
  border:none;
  color:white;
  font-size:24px;
  cursor:pointer;
}

.modal-search{
  width:100%;
  background:#0f172a;
  border:none;
  outline:none;
  color:white;
  padding:14px;
  border-radius:999px;
  margin-bottom:14px;
}

.modal-list{
  max-height:350px;
  overflow-y:auto;
}

.modal-user{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:14px;
  cursor:pointer;
}

.modal-user:hover{
  background:#0f172a;
}

.modal-avatar{
  width:46px;
  height:46px;
  border-radius:50%;
  background:#38bdf8;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  color:black;
}

.modal-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.modal-name{
  font-weight:700;
}

.modal-username{
  font-size:13px;
  color:#94a3b8;
}

</style>
</head>

<body>

<div class="layout">

  <!-- HEADER -->
  <div class="header">

    <div class="header-top">

      <h1>Messages</h1>

      <button
      class="new-btn"
      id="newMsgBtn">
        New Chat
      </button>

    </div>

    <input
    type="text"
    id="searchInput"
    class="search-box"
    placeholder="Search conversations...">

  </div>

  <!-- CONVERSATIONS -->
  <div
  class="conv-list"
  id="convList">

    <div class="empty">

      <div>💬</div>

      <p>Loading conversations...</p>

    </div>

  </div>

</div>

<!-- MODAL -->
<div
class="modal-overlay"
id="modal">

  <div class="modal">

    <div class="modal-top">

      <h3>New Message</h3>

      <button
      class="modal-close"
      id="closeModal">
        ✕
      </button>

    </div>

    <input
    type="text"
    id="modalSearch"
    class="modal-search"
    placeholder="Search users">

    <div
    class="modal-list"
    id="modalList"></div>

  </div>

</div>

<script type="module" src="messages.js"></script>

</body>
</html>
