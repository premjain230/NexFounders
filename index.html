<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NexFounder</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:black;
    color:white;
}

.container{
    display:flex;
    min-height:100vh;
}

/* LEFT SIDE */

.left{
    width:50%;
    background:#0a0a0a;
    display:flex;
    justify-content:center;
    align-items:center;
    border-right:1px solid #2f3336;
}

/* IMAGE PLACEHOLDER */

.image-box{
    width:80%;
    height:80%;
    border-radius:25px;
    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#71767b;
    font-size:25px;
}

/* RIGHT SIDE */

.right{
    width:50%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:400px;
}

.logo{
    color:#1d9bf0;
    font-size:40px;
    margin-bottom:10px;
}

.subtitle{
    color:#71767b;
    margin-bottom:40px;
    line-height:1.5;
}

.login-box h2{
    font-size:35px;
    margin-bottom:30px;
}

/* INPUTS */

.input-box{
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#16181c;
    color:white;
    font-size:16px;
    border:1px solid #2f3336;
}

/* BUTTONS */

.google-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:white;
    color:black;
    font-size:16px;
    cursor:pointer;
    margin-bottom:20px;
    font-weight:bold;
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:#1d9bf0;
    color:white;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
    margin-top:10px;
}

.google-btn:hover{
    opacity:0.9;
}

.login-btn:hover{
    background:#1a8cd8;
}

/* SIGNUP TEXT */

.signup-text{
    margin-top:25px;
    text-align:center;
    color:#71767b;
}

.signup-text a{
    color:#1d9bf0;
    text-decoration:none;
}

.signup-text a:hover{
    text-decoration:underline;
}

</style>

</head>

<body><script type="module" src="app.js"></script>

<div class="container">

    <!-- LEFT SIDE -->

    <div class="left">

        <div class="image-box">
            Your Image Here
        </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="right">

        <div class="login-box">

            <h1 class="logo">NexFounder</h1>

            <p class="subtitle">
                Find founders, build startups,
                and launch together.
            </p>

            <h2>Login</h2>

            <button onclick="googleLogin()">
Sign in with Google
</button>

            <div class="input-box">
                <input type="email" placeholder="Enter your email">
            </div>

            <div class="input-box">
                <input type="password" placeholder="Enter your password">
            </div>

            <button class="login-btn">
                Login
            </button>

            <div class="signup-text">
                Don’t have an account?
                <a href="">Sign Up</a>
            </div>

        </div>

    </div>

</div>
<script type="module" src="signup.js"></script>
    
</body>
</html>
