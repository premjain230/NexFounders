<!DOCTYPE html>
<html>
<head>
<title>Notifications – NexFounder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:#0f172a; color:white; font-family:system-ui, Arial; }
.layout{ display:flex; min-height:100vh; max-width:1200px; margin:auto; }

.sidebar{ width:260px; padding:20px; border-right:1px solid #1e293b; position:sticky; top:0; height:100vh; display:flex; flex-direction:column; gap:6px; }
.logo{ font-size:28px; font-weight:700; color:#22d3ee; padding:10px 14px; margin-bottom:10px; }
.nav-item{ display:flex; align-items:center; gap:14px; padding:13px 14px; border-radius:14px; text-decoration:none; color:white; font-size:17px; transition:0.2s; position:relative; }
.nav-item:hover{ background:#1e293b; }
.nav-item.active{ color:#22d3ee; font-weight:700; }
.nav-icon{ width:24px; text-align:center; }
.nav-badge{ position:absolute; right:14px; top:50%; transform:translateY(-50%); background:#f43f5e; color:white; font-size:11px; font-weight:700; border-radius:10px; padding:2px 7px; min-width:20px; text-align:center; display:none; }
.nav-badge.show{ display:block; }
.nav-user{ display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:14px; margin-top:auto; text-decoration:none; color:white; transition:0.2s; }
.nav-user:hover{ background:#1e293b; }
.nav-avatar{ width:42px; height:42px; border-radius:50%; background:#22d3ee; color:#0f172a; display:flex; align-items:center; justify-content:center; font-weight:700; overflow:hidden; }
.nav-user-name{ font-weight:600; font-size:14px; }
.nav-user-handle{ font-size:12px; color:#64748b; }

.main{ flex:1; }
.page-header{ padding:20px; border-bottom:1px solid #1e293b; font-size:20px; font-weight:700; position:sticky; top:0; background:rgba(15,23,42,0.92); backdrop-filter:blur(10px); z-index:20; display:flex; justify-content:space-between; align-items:center; }
.mark-all-btn{ padding:8px 16px; border:1px solid #1e293b; border-radius:20px; background:transparent; color:#64748b; cursor:pointer; font-size:13px; }
.mark-all-btn:hover{ color:white; border-color:#334155; }

.notif-item{ padding:18px 20px; border-bottom:1px solid #1e293b; display:flex; gap:14px; align-items:flex-start; cursor:pointer; transition:0.15s; }
.notif-item:hover{ background:#111827; }
.notif-item.unread{ background:#0f1f3d; border-left:3px solid #22d3ee; }
.notif-item.unread:hover{ background:#111f3a; }

.notif-icon{ font-size:22px; width:40px; height:40px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.notif-avatar{ width:40px; height:40px; border-radius:50%; background:#2563eb; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; overflow:hidden; }
.notif-avatar img{ width:100%; height:100%; object-fit:cover; border-radius:50%; }

.notif-body{ flex:1; }
.notif-text{ color:#e2e8f0; font-size:15px; line-height:1.5; }
.notif-text b{ color:white; }
.notif-subtext{ color:#64748b; font-size:13px; margin-top:4px; }
.notif-time{ color:#64748b; font-size:12px; margin-top:4px; }

.accept-row{ display:flex; gap:10px; margin-top:10px; }
.accept-btn{ padding:8px 16px; border:none; border-radius:20px; background:#22d3ee; color:#0f172a; font-weight:700; cursor:pointer; font-size:13px; }
.decline-btn{ padding:8px 16px; border:1px solid #334155; border-radius:20px; background:transparent; color:#94a3b8; cursor:pointer; font-size:13px; }

.empty-state{ padding:80px 20px; text-align:center; color:#64748b; }
.empty-state div{ font-size:48px; margin-bottom:16px; }

@media(max-width:900px){
  .sidebar{ width:76px; padding:10px; }
  .nav-item span:not(.nav-icon){ display:none; }
  .nav-user-info{ display:none; }
  .logo{ font-size:20px; padding:10px; }
}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">NexFounder</div>
    <a class="nav-item" href="home.html"><span class="nav-icon">🏠</span><span>Home</span></a>
    <a class="nav-item" href="explore.html"><span class="nav-icon">🔍</span><span>Explore</span></a>
    <a class="nav-item active" href="notifications.html">
      <span class="nav-icon">🔔</span><span>Notifications</span>
      <span class="nav-badge" id="notifBadge"></span>
    </a>
    <a class="nav-item" href="messages.html">
      <span class="nav-icon">💬</span><span>Messages</span>
      <span class="nav-badge" id="msgBadge"></span>
    </a>
    <a class="nav-item" href="profile.html"><span class="nav-icon">👤</span><span>Profile</span></a>
    <a class="nav-user" href="profile.html">
      <div class="nav-avatar" id="navAvatar">?</div>
      <div class="nav-user-info">
        <div class="nav-user-name" id="navName">Loading...</div>
        <div class="nav-user-handle">View Profile</div>
      </div>
    </a>
  </aside>

  <main class="main">
    <div class="page-header">
      🔔 Notifications
      <button class="mark-all-btn" id="markAllBtn">Mark all as read</button>
    </div>
    <div id="notifList">
      <div class="empty-state"><div>🔔</div>Loading...</div>
    </div>
  </main>
</div>
<script type="module" src="notifications.js"></script>
</body>
</html>
