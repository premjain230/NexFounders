<!DOCTYPE html>
<html>
<head>
<title>NexFounder Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:#0b1220; color:white; font-family:system-ui, Arial; }

.navbar{ height:70px; background:rgba(15,23,42,0.92); backdrop-filter:blur(12px); display:flex; justify-content:space-between; align-items:center; padding:0 28px; border-bottom:1px solid #1e293b; position:sticky; top:0; z-index:100; }
.logo{ font-size:24px; font-weight:800; color:#22d3ee; }
.navlinks{ display:flex; gap:20px; }
.navlinks a{ text-decoration:none; color:#94a3b8; font-weight:600; transition:0.2s; }
.navlinks a:hover{ color:#22d3ee; }

.container{ max-width:950px; margin:auto; padding:24px; }

.profilecard{ background:#0f172a; border:1px solid #1e293b; border-radius:28px; overflow:hidden; box-shadow:0 10px 40px rgba(0,0,0,0.35); }

.banner{ height:260px; background:linear-gradient(135deg,#2563eb,#06b6d4,#7c3aed); background-size:cover; background-position:center; position:relative; transition:0.25s; cursor:pointer; }
.banner:hover{ filter:brightness(1.05); }
#bannerInput{ display:none; }
.banner-edit-btn{ position:absolute; right:20px; bottom:20px; border:none; padding:11px 18px; border-radius:14px; background:rgba(0,0,0,0.55); color:white; font-weight:700; backdrop-filter:blur(10px); cursor:pointer; transition:0.2s; }
.banner-edit-btn:hover{ background:rgba(0,0,0,0.75); }

.profilepic{ width:140px; height:140px; border-radius:50%; border:5px solid #0f172a; background:#111827; margin-top:-70px; margin-left:34px; position:relative; z-index:20; display:flex; align-items:center; justify-content:center; font-size:38px; font-weight:800; background-size:cover; background-position:center; box-shadow:0 10px 35px rgba(0,0,0,0.45); overflow:hidden; transition:0.25s; cursor:pointer; }
.profilepic:hover{ transform:scale(1.02); }
#avatarInput{ display:none; }
.avatar-edit-btn{ position:absolute; right:4px; bottom:4px; width:38px; height:38px; border:none; border-radius:50%; background:#22d3ee; color:#0b1220; font-size:16px; font-weight:800; cursor:pointer; box-shadow:0 6px 16px rgba(0,0,0,0.4); transition:0.2s; }
.avatar-edit-btn:hover{ transform:scale(1.08); }

.profilecontent{ padding:22px 34px 34px; }
.name{ font-size:34px; font-weight:800; }
.username{ color:#94a3b8; margin-top:4px; font-size:16px; }
.email{ color:#64748b; font-size:14px; margin-top:6px; }

.btn-row{ display:flex; gap:12px; margin-top:18px; flex-wrap:wrap; align-items:center; }

.editbtn{
  padding:12px 20px; border:none; border-radius:12px; cursor:pointer; font-weight:700; transition:0.2s; font-size:14px;
  background:#2563eb; color:white; display:inline-flex; align-items:center; gap:7px;
}
.editbtn:hover{ background:#3b82f6; }

/* ── FOLLOW BUTTON ── */
.followbtn{
  padding:12px 22px; border:none; border-radius:12px; cursor:pointer; font-weight:700;
  font-size:14px; display:inline-flex; align-items:center; gap:7px; transition:all 0.2s;
  background:linear-gradient(135deg,#22d3ee 0%,#2563eb 100%); color:white;
}
.followbtn:hover{ opacity:0.88; transform:translateY(-1px); }
.followbtn:active{ transform:translateY(0); }
.followbtn:disabled{ opacity:0.55; cursor:not-allowed; transform:none; }
.followbtn.following{
  background:transparent; border:1.5px solid #334155; color:#94a3b8;
  transform:none;
}
.followbtn.following:hover{
  border-color:#ef4444; color:#ef4444;
  background:rgba(239,68,68,0.07); opacity:1; transform:none;
}

/* ── CONNECT BUTTON ── */
.connectbtn{
  padding:12px 20px; border:none; border-radius:12px; cursor:pointer; font-weight:700;
  transition:0.2s; font-size:14px; display:inline-flex; align-items:center; gap:7px;
}
.connectbtn.default{ background:#22d3ee; color:#0b1220; }
.connectbtn.default:hover{ background:#06b6d4; }
.connectbtn.pending{ background:transparent; border:1px solid #334155; color:#64748b; }
.connectbtn.connected{ background:transparent; border:1px solid #22d3ee; color:#22d3ee; }
.connectbtn.accept{ background:#10b981; color:white; }
.connectbtn:disabled{ opacity:0.55; cursor:not-allowed; }

/* ── MESSAGE BUTTON ── */
.messagebtn{
  padding:12px 20px; border-radius:12px; cursor:pointer; font-weight:700; font-size:14px;
  background:#1e293b; color:white; border:1px solid #334155; transition:0.2s;
  display:inline-flex; align-items:center; gap:7px;
}
.messagebtn:hover{ background:#2d3f55; }

.bio{ margin-top:22px; color:#cbd5e1; line-height:1.7; font-size:15px; }

.stats{ display:flex; gap:16px; margin-top:28px; flex-wrap:wrap; }
.statbox{ background:#0b1220; border:1px solid #1e293b; padding:16px 24px; border-radius:18px; min-width:130px; cursor:default; transition:0.2s; }
.statbox:hover{ border-color:#334155; }
.statnumber{ font-size:22px; font-weight:800; }
.statlabel{ color:#94a3b8; font-size:13px; margin-top:3px; }

.postsection{ margin-top:28px; }
.empty{ background:#0f172a; border:1px solid #1e293b; border-radius:20px; padding:50px; text-align:center; color:#64748b; }

.modal-overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,0.72); justify-content:center; align-items:center; z-index:500; }
.modal-overlay.open{ display:flex; }
.modal{ background:#0f172a; padding:28px; border-radius:22px; width:100%; max-width:480px; border:1px solid #1e293b; box-shadow:0 15px 45px rgba(0,0,0,0.45); }
.field{ margin-bottom:14px; }
.field input, .field textarea{ width:100%; padding:13px 14px; border-radius:14px; border:1px solid #1e293b; background:#0b1220; color:white; outline:none; resize:none; font-family:inherit; font-size:15px; transition:0.2s; }
.field input:focus, .field textarea:focus{ border-color:#22d3ee; }
.field textarea{ min-height:110px; }
.modal-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:16px; }
.savebtn{ background:#22d3ee; color:#0b1220; border:none; padding:12px 20px; border-radius:12px; cursor:pointer; font-weight:700; transition:0.2s; }
.savebtn:hover{ background:#06b6d4; }
.savebtn:disabled{ opacity:0.55; cursor:not-allowed; }
.cancelbtn{ background:transparent; border:1px solid #1e293b; color:#94a3b8; padding:12px 20px; border-radius:12px; cursor:pointer; transition:0.2s; }
.cancelbtn:hover{ border-color:#334155; color:white; }

@media(max-width:700px){
  .container{ padding:12px; }
  .banner{ height:190px; }
  .profilepic{ width:115px; height:115px; margin-top:-58px; margin-left:22px; font-size:30px; }
  .profilecontent{ padding:18px 22px 26px; }
  .name{ font-size:28px; }
  .stats{ flex-wrap:wrap; }
  .btn-row{ gap:8px; }
  .followbtn, .connectbtn, .messagebtn, .editbtn{ padding:10px 16px; font-size:13px; }
}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">NexFounder</div>
  <div class="navlinks">
    <a href="home.html">Home</a>
    <a href="explore.html">Explore</a>
    <a href="notifications.html">Notifications</a>
    <a href="messages.html">Messages</a>
    <a href="profile.html">Profile</a>
  </div>
</div>

<div class="container">
  <div class="profilecard">

    <div class="banner" id="banner">
      <button class="banner-edit-btn" id="bannerEditBtn" style="display:none">✎ Change Banner</button>
    </div>
    <input type="file" id="bannerInput" accept="image/*">

    <div class="profilepic" id="avatar">
      <button class="avatar-edit-btn" id="avatarEditBtn" style="display:none">✎</button>
    </div>
    <input type="file" id="avatarInput" accept="image/*">

    <div class="profilecontent">
      <div class="name" id="displayName"></div>
      <div class="username" id="displayUsername"></div>
      <div class="email" id="displayEmail"></div>

      <div class="btn-row">
        <!-- Own profile -->
        <button class="editbtn" id="openEditBtn" style="display:none">✎ Edit Profile</button>
        <!-- Other profiles only -->
        <button class="followbtn" id="followBtn" style="display:none">＋ Follow</button>
        <button class="connectbtn default" id="connectBtn" style="display:none">Connect</button>
        <button class="messagebtn" id="messageBtn" style="display:none">💬 Message</button>
      </div>

      <div class="bio" id="displayBio"></div>

      <div class="stats">
        <div class="statbox">
          <div class="statnumber" id="followersCount">0</div>
          <div class="statlabel">Followers</div>
        </div>
        <div class="statbox">
          <div class="statnumber" id="followingCount">0</div>
          <div class="statlabel">Following</div>
        </div>
        <div class="statbox">
          <div class="statnumber" id="connectionsCount">0</div>
          <div class="statlabel">Connections</div>
        </div>
      </div>
    </div>
  </div>

  <div class="postsection" id="userPosts">
    <div class="empty">Loading posts...</div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="field"><input id="inputName" placeholder="Name"></div>
    <div class="field"><input id="inputUsername" placeholder="Username"></div>
    <div class="field"><textarea id="inputBio" placeholder="Bio"></textarea></div>
    <div class="modal-actions">
      <button class="cancelbtn" id="cancelBtn">Cancel</button>
      <button class="savebtn" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<script type="module" src="profile.js"></script>
</body>
</html>
