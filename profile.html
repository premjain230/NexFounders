<!DOCTYPE html>
<html>
<head>
<title>NexFounder Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:system-ui, Arial;
}

/* Navbar */

.navbar{
    height:70px;
    background:#111827;
    border-bottom:1px solid #1f2937;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 25px;
}

.logo{
    font-size:24px;
    font-weight:700;
    color:#22d3ee;
}

.navlinks{
    display:flex;
    gap:20px;
}

.navlinks a{
    text-decoration:none;
    color:#cbd5e1;
    transition:0.2s;
}

.navlinks a:hover{
    color:#22d3ee;
}

/* Main */

.container{
    max-width:900px;
    margin:auto;
    padding:25px;
}

/* Profile Card */

.profilecard{
    background:#111827;
    border:1px solid #1f2937;
    border-radius:24px;
    overflow:hidden;
}

/* Banner */

.banner{
    height:220px;
    background:linear-gradient(
        135deg,
        #2563eb,
        #06b6d4,
        #7c3aed
    );

    position:relative;
}

/* Profile Pic */

.profilepic{
    width:130px;
    height:130px;
    border-radius:50%;

    background:#22d3ee;
    color:#0f172a;

    border:6px solid #111827;

    position:absolute;
    bottom:-65px;
    left:30px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:34px;
    font-weight:700;
}

/* Content */

.profilecontent{
    padding:85px 30px 30px;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:20px;
    flex-wrap:wrap;
}

.name{
    font-size:32px;
    font-weight:700;
}

.username{
    margin-top:5px;
    color:#94a3b8;
}

/* Button */

.editbtn{
    padding:12px 18px;
    border:none;
    border-radius:12px;

    background:#2563eb;
    color:white;

    font-weight:600;
    cursor:pointer;

    transition:0.2s;
}

.editbtn:hover{
    background:#3b82f6;
    transform:scale(1.03);
}

/* Bio */

.bio{
    margin-top:20px;
    color:#cbd5e1;
    line-height:1.6;
}

/* Stats */

.stats{
    display:flex;
    gap:18px;
    margin-top:25px;
    flex-wrap:wrap;
}

.statbox{
    background:#0f172a;
    border:1px solid #1e293b;

    padding:14px 22px;

    border-radius:16px;
}

.statnumber{
    font-size:20px;
    font-weight:700;
}

.statlabel{
    margin-top:4px;
    color:#94a3b8;
    font-size:14px;
}

/* Empty Posts */

.postsection{
    margin-top:25px;
}

.empty{
    background:#111827;
    border:1px solid #1f2937;
    border-radius:20px;

    padding:40px;
    text-align:center;

    color:#94a3b8;
}

@media(max-width:700px){

    .profilepic{
        width:110px;
        height:110px;
        font-size:28px;
    }

    .name{
        font-size:26px;
    }

}

</style>
</head>

<body>

<!-- Navbar -->

<div class="navbar">

    <div class="logo">
        NexFounder
    </div>

    <div class="navlinks">
        <a href="home.html">Home</a>
        <a href="profile.html">Profile</a>
    </div>

</div>

<!-- Main -->

<div class="container">

    <div class="profilecard">

        <!-- Banner -->
        <div class="banner">

            <!-- Profile Pic -->
            <div class="profilepic"></div>

        </div>

        <!-- Profile Content -->
        <div class="profilecontent">

            <div class="top">

                <div>
                    <div class="name"></div>
                    <div class="username"></div>
                </div>

                <button class="editbtn">
                    Edit Profile
                </button>

            </div>

            <!-- Bio -->
            <div class="bio">
                No bio added yet.
            </div>

            <!-- Stats -->
            <div class="stats">

                <div class="statbox">
                    <div class="statnumber">0</div>
                    <div class="statlabel">
                        Followers
                    </div>
                </div>

                <div class="statbox">
                    <div class="statnumber">0</div>
                    <div class="statlabel">
                        Following
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- Posts -->

    <div class="postsection">

        <div class="empty">
            No posts yet.
        </div>

    </div>

</div>

<script type="module" src="profile.js"></script>

</body>
</html>
