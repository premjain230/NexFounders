<!DOCTYPE html>
<html>
<head>
<title>NexFounder – Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, Arial;
}

body{
  background:#0b1220;
  color:white;
}

/* layout */
.layout{
  display:flex;
  min-height:100vh;
  max-width:1200px;
  margin:auto;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  padding:20px;
  border-right:1px solid #1e293b;
  position:sticky;
  top:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.logo{
  font-size:26px;
  font-weight:800;
  color:#22d3ee;
  padding:10px 14px;
}

.nav-item{
  display:flex;
  align-items:center;
  gap:14px;
  padding:13px 14px;
  border-radius:14px;
  text-decoration:none;
  color:white;
}

.nav-item:hover{
  background:#1e293b;
}

.nav-icon{
  width:24px;
  text-align:center;
}

/* FEED */
.feed-col{
  flex:1;
  border-right:1px solid #1e293b;
  min-height:100vh;
}

/* create post */
.create-post{
  padding:18px 20px;
  border-bottom:1px solid #1e293b;
  display:flex;
  gap:12px;
}

.create-avatar{
  width:46px;
  height:46px;
  border-radius:50%;
  background:#22d3ee;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  color:#0b1220;
}

.create-right{
  flex:1;
}

textarea{
  width:100%;
  background:transparent;
  border:none;
  outline:none;
  color:white;
  font-size:16px;
  min-height:70px;
}

.create-actions{
  margin-top:10px;
  border-top:1px solid #1e293b;
  padding-top:12px;
  display:flex;
  justify-content:space-between;
}

.create-actions button{
  padding:10px 22px;
  border:none;
  border-radius:24px;
  background:#2563eb;
  color:white;
  font-weight:700;
  cursor:pointer;
}

/* POSTS (minimal) */
.post{
  padding:18px 20px;
  border-bottom:1px solid #1e293b;
}

.post:hover{
  background:#0f172a;
}

.rightbar{
  width:320px;
  padding:20px;
  position:sticky;
  top:0;
  height:100vh;
}
</style>
</head>

<body>

<div class="layout">

<aside class="sidebar">
  <div class="logo">NexFounder</div>

  <a class="nav-item" href="#"><span class="nav-icon">🏠</span>Home</a>
  <a class="nav-item" href="#"><span class="nav-icon">🔍</span>Explore</a>
  <a class="nav-item" href="#"><span class="nav-icon">🔔</span>Notifications</a>
  <a class="nav-item" href="#"><span class="nav-icon">💬</span>Messages</a>
  <a class="nav-item" href="#"><span class="nav-icon">👤</span>Profile</a>
</aside>

<main class="feed-col">

  <div class="create-post">
    <div class="create-avatar">P</div>
    <div class="create-right">
      <textarea id="postInput" placeholder="Share your startup idea..."></textarea>
      <div class="create-actions">
        <input type="file" id="mediaInput">
        <button id="postBtn">Post</button>
      </div>
    </div>
  </div>

  <div id="feed"></div>

</main>

<aside class="rightbar"></aside>

</div>

<script type="module" src="home.js"></script>

</body>
</html>
