<!doctype html>
<html>
<head>
<title>NexFounder Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1220;
    color:white;
    font-family:system-ui, Arial;
}

/* ───────── NAVBAR ───────── */
.navbar{
    height:65px;
    background:#0f172a;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 25px;
    border-bottom:1px solid #1e293b;
    position:sticky;
    top:0;
}

.logo{
    font-size:22px;
    font-weight:800;
    color:#38bdf8;
}

.navlinks a{
    text-decoration:none;
    color:#94a3b8;
    margin-left:18px;
}

.navlinks a:hover{
    color:#38bdf8;
}

/* ───────── CONTAINER ───────── */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* ───────── PROFILE CARD ───────── */
.profilecard{
    background:#0f172a;
    border:1px solid #1e293b;
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 0 40px rgba(56,189,248,0.05);
}

/* ───────── BANNER ───────── */
.banner{
    height:220px;
    background:linear-gradient(135deg,#2563eb,#06b6d4,#7c3aed);
    position:relative;
    background-size:cover;
    background-position:center;
    cursor:pointer;
}

/* hidden input */
#bannerInput{
    display:none;
}

/* ───────── PROFILE PIC ───────── */
.profilepic{
    width:130px;
    height:130px;
    border-radius:50%;
    background:#111827;
    border:4px solid #0f172a;
    position:absolute;
    bottom:-65px;
    left:30px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    font-weight:800;
    cursor:pointer;
    background-size:cover;
    background-position:center;
    transition:0.2s;
}

.profilepic:hover{
    transform:scale(1.05);
}

#avatarInput{
    display:none;
}

/* ───────── CONTENT ───────── */
.profilecontent{
    padding:85px 30px 30px;
}

.name{
    font-size:28px;
    font-weight:800;
}

.username{
    color:#94a3b8;
}

.email{
    color:#64748b;
    font-size:13px;
}

/* ───────── BUTTONS ───────── */
.btn-row{
    display:flex;
    gap:10px;
    margin-top:12px;
}

.editbtn,
.followbtn{
    padding:10px 16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

.editbtn{
    background:#1d4ed8;
    color:white;
}

.editbtn:hover{
    background:#2563eb;
}

.followbtn{
    background:#38bdf8;
    color:#0b1220;
}

.followbtn.following{
    background:transparent;
    border:1px solid #334155;
    color:#94a3b8;
}

/* ───────── BIO ───────── */
.bio{
    margin-top:18px;
    color:#cbd5e1;
    line-height:1.4;
}

/* ───────── STATS ───────── */
.stats{
    display:flex;
    gap:15px;
    margin-top:22px;
}

.statbox{
    background:#0b1220;
    border:1px solid #1e293b;
    padding:14px 20px;
    border-radius:16px;
    min-width:120px;
}

.statnumber{
    font-size:20px;
    font-weight:800;
}

.statlabel{
    color:#94a3b8;
    font-size:13px;
}

/* ───────── POSTS ───────── */
.postsection{
    margin-top:25px;
}

.empty{
    background:#0f172a;
    border:1px solid #1e293b;
    border-radius:18px;
    padding:40px;
    text-align:center;
    color:#64748b;
}

/* ───────── MODAL ───────── */
.modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.modal-overlay.open{
    display:flex;
}

.modal{
    background:#0f172a;
    padding:25px;
    border-radius:16px;
    width:100%;
    max-width:450px;
    border:1px solid #1e293b;
}

.field{
    margin-bottom:12px;
}

.field input,
.field textarea{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #1e293b;
    background:#0b1220;
    color:white;
}

.modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
}

.savebtn{
    background:#38bdf8;
    color:#0b1220;
    border:none;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
}

.cancelbtn{
    background:transparent;
    border:1px solid #1e293b;
    color:#94a3b8;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">NexFounder</div>
    <div class="navlinks">
        <a href="home.html">Home</a>
        <a href="profile.html">Profile</a>
    </div>
</div>

<div class="container">

<div class="profilecard">

<!-- BANNER (click to upload) -->
<div class="banner" id="banner">
    <input type="file" id="bannerInput" accept="image/*">
</div>

<!-- PROFILE PIC (click to upload) -->
<div class="profilepic" id="avatar">
    <input type="file" id="avatarInput" accept="image/*">
</div>

<div class="profilecontent">

<div class="name" id="displayName"></div>
<div class="username" id="displayUsername"></div>
<div class="email" id="displayEmail"></div>

<div class="btn-row">
    <button class="followbtn" id="followBtn">Follow</button>
    <button class="editbtn" id="openEditBtn">Edit Profile</button>
</div>

<div class="bio" id="displayBio"></div>

<div class="stats">
    <div class="statbox">
        <div class="statnumber" id="followersCount">0</div>
        <div class="statlabel">Followers</div>
    </div>
    <div class="statbox">
        <div class="statnumber" id="followingCount">0</div>
        <div class="statlabel">Following</div>
    </div>
</div>

</div>
</div>

<div class="postsection" id="userPosts">
    <div class="empty">Loading posts...</div>
</div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="editModal">
<div class="modal">

<div class="field">
<input id="inputName" placeholder="Name">
</div>

<div class="field">
<input id="inputUsername" placeholder="Username">
</div>

<div class="field">
<textarea id="inputBio" placeholder="Bio"></textarea>
</div>

<div class="modal-actions">
<button class="cancelbtn" id="cancelBtn">Cancel</button>
<button class="savebtn" id="saveBtn">Save</button>
</div>

</div>
</div>

<script type="module" src="profile.js"></script>

</body>
</html>
